[package]
name = "rom-weaver-libarchive-sys"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
version.workspace = true
build = "build.rs"
links = "archive"

[dependencies]
bzip2-sys = { version = "0.1.11", features = ["static"] }
libc = "0.2.137"
liblzma-sys = { version = "0.4.6", features = ["static"] }
libz-sys = { workspace = true, features = ["static"] }
lz4-sys = "1.9.4"
zstd-sys.workspace = true

[target.'cfg(all(not(target_vendor = "apple"), not(target_family = "wasm")))'.dependencies]
openssl-sys = { version = "0.9.80", features = ["vendored"] }

[build-dependencies]
bindgen = "0.72.1"
cmake = "0.1.58"
path-slash = "0.2.1"
