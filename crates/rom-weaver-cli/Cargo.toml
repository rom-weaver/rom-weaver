[package]
name = "rom-weaver-cli"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
version.workspace = true

[dependencies]
rom-weaver-checksum = { path = "../rom-weaver-checksum" }
rom-weaver-codecs = { path = "../rom-weaver-codecs" }
rom-weaver-containers = { path = "../rom-weaver-containers" }
rom-weaver-core = { path = "../rom-weaver-core" }
serde_json.workspace = true
tracing.workspace = true
xdvdfs.workspace = true

[target.'cfg(target_arch = "wasm32")'.dependencies]
rom-weaver-patches = { path = "../rom-weaver-patches" }
tracing-subscriber = { version = "0.3.20", default-features = false, features = ["fmt", "std"] }

[target.'cfg(not(target_family = "wasm"))'.dependencies]
bzip2.workspace = true
clap.workspace = true
flate2.workspace = true
lzma-rust2.workspace = true
rom-weaver-patches = { path = "../rom-weaver-patches" }
tar.workspace = true
tracing-subscriber.workspace = true
zstd.workspace = true

[dev-dependencies]
assert_cmd.workspace = true
assert_fs.workspace = true
flate2.workspace = true
nod.workspace = true
predicates.workspace = true
serde_json.workspace = true

[[bin]]
name = "rom-weaver"
path = "src/main.rs"
