<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RomWeaver Mobile Safari Matrix</title>
    <meta name="theme-color" content="#31343a" />
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        margin: 0;
        background: Canvas;
        color: CanvasText;
      }

      main {
        box-sizing: border-box;
        margin: 0 auto;
        max-width: 920px;
        min-height: 100vh;
        padding: 20px;
      }

      h1 {
        font-size: 1.35rem;
        line-height: 1.2;
        margin: 0 0 16px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 16px;
      }

      button {
        border: 1px solid color-mix(in srgb, CanvasText 24%, transparent);
        border-radius: 6px;
        color: CanvasText;
        font: inherit;
        min-height: 40px;
        padding: 8px 12px;
      }

      button:disabled {
        opacity: 0.55;
      }

      #matrix-run,
      #matrix-run-exhaustive,
      #matrix-run-stress {
        background: #2f6f5e;
        border-color: #2f6f5e;
        color: white;
      }

      .panel {
        border: 1px solid color-mix(in srgb, CanvasText 18%, transparent);
        border-radius: 8px;
        margin: 12px 0;
        padding: 12px;
      }

      .grid {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      }

      .metric {
        border-left: 3px solid color-mix(in srgb, CanvasText 28%, transparent);
        padding-left: 8px;
      }

      .metric strong {
        display: block;
        font-size: 0.8rem;
        opacity: 0.72;
      }

      pre {
        margin: 0;
        max-height: 48vh;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>RomWeaver Mobile Safari Matrix</h1>
      <div class="toolbar">
        <button id="matrix-run" type="button">Run fast matrix</button>
        <button id="matrix-run-exhaustive" type="button">Run exhaustive matrix</button>
        <button id="matrix-run-stress" type="button">Run archive stress</button>
        <button disabled id="matrix-copy" type="button">Copy report</button>
        <button disabled id="matrix-download" type="button">Download report</button>
      </div>
      <section class="panel">
        <div class="grid" id="matrix-summary"></div>
      </section>
      <section class="panel">
        <pre id="matrix-log"></pre>
      </section>
    </main>
    <script type="module" src="./src/webapp/mobile-safari-matrix.ts"></script>
  </body>
</html>
