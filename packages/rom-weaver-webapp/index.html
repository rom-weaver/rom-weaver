<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>RomWeaver — Apply ROM patches online</title>
    <meta name="theme-color" content="#0c0f13" />
    <meta name="color-scheme" content="dark light" />
    <style>
      /*
       * Pre-paint background bridge. The themed canvas color (--chassis) is only defined under
       * :root[data-theme] in tokens.css, and data-theme is set by theme.ts *after* the bundle loads,
       * so a service-worker reload would otherwise paint the browser default (white) for one frame.
       * These rules paint the correct background from the first frame, matching theme.ts's no-stored-
       * preference fallback exactly: prefers-color-scheme, dark as the ultimate default. Colors are
       * hardcoded copies of --chassis (dark/light) because inline HTML can't read CSS custom properties
       * that live in the not-yet-loaded bundle; keep them in sync with tokens.css. Both rules are gated
       * on :not([data-theme]) so they stop applying the instant theme.ts sets the attribute — after that
       * the design system owns the background and there is zero interference. (A user who toggled to the
       * theme opposite their OS still sees one frame of their OS color before their stored choice applies.)
       * These comments live inside <style> so lightningcss (cssMinify) strips them from the build; an
       * HTML <!-- --> comment would ship to production unstripped.
       */
      html:not([data-theme]) {
        background: #0c0f13;
      }
      @media (prefers-color-scheme: light) {
        html:not([data-theme]) {
          background: #ece9e1;
        }
      }
    </style>
    <script>
      // Resolve data-theme/data-accent before first paint so the prerendered shell
      // inside #webapp-root paints with the :root[data-theme] design tokens instead
      // of waiting for theme.ts in the bundle. Mirrors theme.ts (stored preference,
      // else prefers-color-scheme, dark default) and accent.ts (settings store's
      // accent field; madder = no attribute). theme.ts/accent.ts re-apply the same
      // values on boot, so this only moves the attribute earlier - keep in sync.
      (function () {
        try {
          const stored = localStorage.getItem("rom-weaver-theme");
          const preferred = stored === "light" || stored === "dark" ? stored : "";
          const system = matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
          document.documentElement.setAttribute("data-theme", preferred || system);
          const settings = JSON.parse(localStorage.getItem("rom-weaver-settings") || "null");
          const common = settings && settings.common ? settings.common : null;
          const storedAccent = common && typeof common.accent === "string" ? common.accent : "";
          const accents = ["madder", "woad", "verdigris", "plum", "ochre"];
          const accent = accents.includes(storedAccent)
            ? storedAccent
            : document.documentElement.getAttribute("data-accent") || "madder";
          if (accent === "madder") document.documentElement.removeAttribute("data-accent");
          else document.documentElement.setAttribute("data-accent", accent);
        } catch (error) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <script>
      // Seed --wall-clock (epoch seconds) before first paint so the prerendered
      // hero's extension ticker sits at its wall-clock phase - the same phase
      // the client stamps per mount (layout.tsx) - and the createRoot swap
      // continues the marquee seamlessly instead of jumping. See formats-ticker
      // in dropzone.css.
      document.documentElement.style.setProperty("--wall-clock", `${Date.now() / 1000}s`);
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="RomWeaver" />
    <meta

    />

    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <script>
      // Buffer clicks that land on the prerendered shell before React's first
      // mount attaches any handler - without this they are silently swallowed.
      // Has to be inline: the bundle is a module, so it only runs after the HTML
      // is parsed, while the shell is painted and clickable well before that.
      // Nodes are kept as-is; src/webapp/shell-click-replay.ts reads their
      // identity off them (they survive detachment) and replays what it can.
      (function () {
        function record(event) {
          if (buffer.clicks.length < 4) buffer.clicks.push({ target: event.target, time: Date.now() });
        }
        var buffer = {
          clicks: [],
          stop: function () {
            document.removeEventListener("click", record, true);
          },
        };
        window.ROM_WEAVER_SHELL_CLICKS = buffer;
        document.addEventListener("click", record, true);
      })();
    </script>
    <script type="module" src="./src/webapp/main.tsx"></script>
  </head>
  <body>
    <div id="webapp-root" aria-busy="true"></div>
    <script>
      // Fill the prerendered environment slot before first paint. React reads
      // the same browser value, so replacing the shell cannot move the masthead.
      (function () {
        const slot = document.querySelector(".masthead-threads");
        const threads = navigator.hardwareConcurrency;
        if (slot && threads) slot.textContent = `· ${threads} ${slot.dataset.threadLabel}`;
      })();
    </script>
  </body>
