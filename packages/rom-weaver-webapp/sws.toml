[general]
# 0.0.0.0 so Docker's IPv4 port forwarding reaches it; 8080 is unprivileged
# (the image runs as non-root).
host = "0.0.0.0"
port = 8080
root = "/srv"

# Serve the Docker-generated *.br / *.gz siblings directly instead of compressing live.
compression-static = true

# SPA fallback for client-side routes; no-log /health endpoint for probes.
page-fallback = "/srv/index.html"
health = true

# Long-lived caching for the content-hashed assets.
cache-control-headers = true

log-level = "info"

[advanced]

# Cross-origin isolation - required for SharedArrayBuffer (wasm threads).
# Applied to every response so it survives a TLS-terminating reverse proxy.
[[advanced.headers]]
source = "**"

[advanced.headers.headers]
Cross-Origin-Opener-Policy = "same-origin"
Cross-Origin-Embedder-Policy = "require-corp"
Cross-Origin-Resource-Policy = "same-origin"
