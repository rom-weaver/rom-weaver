[general]
# 0.0.0.0 so Docker's IPv4 port forwarding reaches it; 8080 is unprivileged
# (the image runs as non-root).
host = "0.0.0.0"
port = 8080
root = "/srv"

# Serve the Docker-generated *.br siblings directly instead of compressing live.
compression-static = true

# Fallback for the few clients that do not accept brotli: no *.gz is baked into
# the image, so they get gzipped on demand instead. Default-on in sws, set here
# because `compression-static` above now depends on it for full coverage.
# Leave the level alone - `best` would mean brotli quality 11 per request, and
# sws compresses every response from scratch.
compression = true

# SPA fallback for client-side routes; no-log /health endpoint for probes.
page-fallback = "/srv/index.html"
health = true

# Long-lived caching for the content-hashed assets.
cache-control-headers = true

log-level = "info"

[advanced]

# Cross-origin isolation - required for SharedArrayBuffer (wasm threads).
# Applied to every response so it survives a TLS-terminating reverse proxy.
[[advanced.headers]]
source = "**"

[advanced.headers.headers]
Cross-Origin-Opener-Policy = "same-origin"
Cross-Origin-Embedder-Policy = "require-corp"
Cross-Origin-Resource-Policy = "same-origin"
