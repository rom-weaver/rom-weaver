name: Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: docker
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
      WASI_SDK_VERSION: "33"
      WASI_SDK_SHA256: 0ba8b5bfaeb2adf3f29bab5841d76cf5318ab8e1642ea195f88baba1abd47bce
      # Skip three mise tools for this job:
      # - binaryen/ripgrep: mise fetches them via the GitHub API, which 401s
      #   with the Forgejo runner's injected token. wasm-opt is installed
      #   directly below; ripgrep isn't needed for the build.
      # - rust: dtolnay installs stable + the wasm32-wasip1-threads target via
      #   rustup. If mise also installs its own rust, `mise run` uses that one
      #   (no wasm target) and the build fails E0463. Disabling it here makes
      #   `mise run` use the rustup toolchain (with the target) from PATH.
      MISE_DISABLE_TOOLS: "aqua:WebAssembly/binaryen,aqua:BurntSushi/ripgrep,rust"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          apt-get update
          # clang + libclang-dev: libarchive-sys runs bindgen, which needs a
          # host libclang.so to parse headers (the WASI SDK clang is target-only).
          apt-get install --yes brotli cmake ninja-build pkg-config sccache clang libclang-dev
          lc="$(find /usr/lib /usr/lib64 -name 'libclang.so*' 2>/dev/null | head -n1)"
          [ -n "$lc" ] && echo "LIBCLANG_PATH=$(dirname "$lc")" >> "$GITHUB_ENV" || true

      - name: Install Rust toolchain
        uses: https://github.com/dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1-threads

      # Full (unpruned) cargo + target cache so the libarchive C/cmake build and
      # dependency compiles are reused, not just the registry. Keyed on Cargo.lock;
      # restore-keys gives a partial hit when deps change. This runner's
      # actions/cache restores absolute paths (tar -P), so ~/.cargo works too.
      - name: Cargo + target cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-v1-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-v1-

      - name: Install mise (node, rust)
        uses: https://github.com/jdx/mise-action@v2
        with:
          install: true

      - name: Cache WASI SDK
        uses: actions/cache@v4
        with:
          path: /opt/wasi-sdk-${{ env.WASI_SDK_VERSION }}
          key: wasi-sdk-${{ env.WASI_SDK_VERSION }}-x86_64-linux

      - name: Install WASI SDK
        run: |
          # Stable path (not $RUNNER_TEMP) so it's cacheable across runs.
          SDK="/opt/wasi-sdk-${WASI_SDK_VERSION}"
          if [ ! -x "$SDK/bin/clang" ]; then
            curl --fail --location --show-error \
              --output "$RUNNER_TEMP/wasi-sdk.tar.gz" \
              "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux.tar.gz"
            echo "${WASI_SDK_SHA256}  $RUNNER_TEMP/wasi-sdk.tar.gz" | sha256sum --check
            mkdir -p "$SDK"
            tar --extract --gzip --strip-components=1 \
              --file "$RUNNER_TEMP/wasi-sdk.tar.gz" --directory "$SDK"
          fi
          echo "WASI_SDK_PATH=$SDK" >> "$GITHUB_ENV"
          # libarchive-sys runs bindgen with the *host* libclang (Debian's here,
          # not Ubuntu's), which doesn't resolve WASI SDK 33's multiarch sysroot
          # from --sysroot alone. Point bindgen straight at the include dir that
          # actually holds sys/stat.h for our target, plus the common include.
          SYSROOT="$SDK/share/wasi-sysroot"
          INCDIR="$SYSROOT/include/wasm32-wasip1-threads"
          if [ ! -f "$INCDIR/sys/stat.h" ]; then
            STATH="$(find "$SYSROOT" -path '*/sys/stat.h' 2>/dev/null | head -n1)"
            INCDIR="$(dirname "$(dirname "$STATH")")"
          fi
          # Only add the sysroot include paths — do NOT override --target here.
          # build.rs already sets --target=$HOST (needed for the complete
          # function set); forcing the wasm target #if's some archive_* funcs
          # out and breaks downstream crates with E0432.
          echo "BINDGEN_EXTRA_CLANG_ARGS=-isystem $INCDIR -isystem $SYSROOT/include" >> "$GITHUB_ENV"

      - name: Cache binaryen
        uses: actions/cache@v4
        with:
          path: /opt/binaryen-129
          key: binaryen-129-x86_64-linux

      - name: Install binaryen (wasm-opt), pinned to match mise
        run: |
          BIN=/opt/binaryen-129
          if [ ! -x "$BIN/bin/wasm-opt" ]; then
            curl --fail --location --show-error \
              --output "$RUNNER_TEMP/binaryen.tar.gz" \
              "https://github.com/WebAssembly/binaryen/releases/download/version_129/binaryen-version_129-x86_64-linux.tar.gz"
            mkdir -p "$BIN"
            tar --extract --gzip --strip-components=1 \
              --file "$RUNNER_TEMP/binaryen.tar.gz" --directory "$BIN"
          fi
          echo "$BIN/bin" >> "$GITHUB_PATH"

      - name: Cache npm downloads
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('packages/rom-weaver-react/package-lock.json') }}
          restore-keys: npm-

      - name: Install package dependencies
        run: npm ci --prefix packages/rom-weaver-react

      - name: Build WASM
        run: mise run build-wasm-prod

      - name: Build webapp
        run: npm --prefix packages/rom-weaver-react run build

      - name: Publish to forgejo-pages
        uses: https://codeberg.org/git-pages/action@v2
        with:
          # Project page -> https://bcasey.forgejo-pages.koof.win/rom-weaver/
          site:   https://${{ forge.event.repository.owner.username }}.forgejo-pages.koof.win/rom-weaver/
          server: forgejo-pages.koof.win
          token:  ${{ forge.token }}
          source: packages/rom-weaver-react/dist/
