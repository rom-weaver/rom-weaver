name: Coverage

on:
  workflow_dispatch:
  schedule:
    # Informational and expensive: sample the current main branch weekly instead
    # of repeating the full test corpus after every successful CI run.
    - cron: "43 6 * * 0"

permissions:
  contents: read

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      CARGO_TERM_COLOR: always
      ROM_WEAVER_COVERAGE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Restore production WASM
        id: wasm-cache
        uses: ./.github/actions/wasm-cache
        with:
          variant: prod

      - uses: ./.github/actions/setup-build-env
        with:
          tools: node rust binaryen
          apt-packages: cmake ninja-build pkg-config clang libclang-dev
          rust-components: llvm-tools-preview
          rust-targets: wasm32-wasip1-threads
          wasi-sdk: "true"
          cache-save: "false"
          webapp-deps: "true"
          playwright: "true"

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Build production WASM
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: mise run build-wasm-prod

      - name: Verify WASM artifact
        run: node scripts/wasm/verify-wasm-artifact.mjs packages/rom-weaver-webapp/src/wasm

      - name: Rust coverage
        run: mise run coverage-rust

      - name: React unit coverage
        run: npm --prefix packages/rom-weaver-webapp run test:unit:coverage

      - name: React UI coverage
        run: npm --prefix packages/rom-weaver-webapp run test:browser:coverage

      - name: React wasm coverage
        run: npm --prefix packages/rom-weaver-webapp run test:browser:wasm:coverage

      - name: Coverage summary
        run: node scripts/coverage-summary.mjs

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: dist/coverage/**
          if-no-files-found: warn
