name: E2E Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "41 7 * * *"

# Least privilege: this workflow only reads the repo. Declared explicitly so it
# does not inherit whatever the repository default happens to be.
permissions:
  contents: read

jobs:
  exhaustive:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      # This is a scheduled run with no concurrent CI run to borrow an artifact
      # from, and `run-e2e.mjs` drives the *dev* wasm build (no wasm-opt/brotli)
      # rather than the production module CI publishes - so it keeps building
      # its own. Only the setup boilerplate is shared.
      - uses: ./.github/actions/setup-build-env
        with:
          apt-packages: cmake ninja-build pkg-config clang libclang-dev
          rust-targets: wasm32-wasip1-threads
          wasi-sdk: "true"
          webapp-deps: "true"
          playwright: "true"
          playwright-browsers: chromium webkit

      - name: Run exhaustive E2E matrix
        run: mise run test-e2e-nightly

      - name: Verify production service worker and offline isolation
        run: npm --prefix packages/rom-weaver-webapp run verify:sw:no-coop-coep

      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-failure-evidence
          path: |
            packages/rom-weaver-webapp/tests/wasm/__screenshots__/**
            test-results/**
          if-no-files-found: ignore
