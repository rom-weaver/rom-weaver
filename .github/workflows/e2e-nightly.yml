name: Nightly browser E2E

on:
  workflow_dispatch:
  schedule:
    - cron: "41 7 * * *"

# Least privilege: this workflow only reads the repo. Declared explicitly so it
# does not inherit whatever the repository default happens to be.
permissions:
  contents: read

jobs:
  exhaustive:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # The nightly suite uses a dev wasm module (no wasm-opt/brotli), so it
      # cannot consume CI's production artifact. Cache the exact dev build
      # separately; unchanged scheduled runs skip its ~6.5 minute compile.
      - name: Restore development WASM module
        id: wasm-cache
        uses: ./.github/actions/wasm-cache
        with:
          variant: dev
          path: |
            packages/rom-weaver-webapp/src/wasm/rom-weaver-app.wasm
            packages/rom-weaver-webapp/src/wasm/NOTICE
            packages/rom-weaver-webapp/src/wasm/THIRD_PARTY_LICENSES.md
            packages/rom-weaver-webapp/src/wasm/third_party

      - uses: ./.github/actions/setup-build-env
        with:
          tools: node rust
          apt-packages: cmake ninja-build pkg-config clang libclang-dev
          rust-targets: wasm32-wasip1-threads
          wasi-sdk: "true"
          webapp-deps: "true"
          playwright: "true"
          playwright-browsers: chromium webkit

      - name: Verify cached development WASM artifact
        if: steps.wasm-cache.outputs.cache-hit == 'true'
        run: node scripts/wasm/verify-wasm-artifact.mjs packages/rom-weaver-webapp/src/wasm --dev

      - name: Run exhaustive E2E matrix
        env:
          ROM_WEAVER_E2E_SKIP_WASM_BUILD: ${{ steps.wasm-cache.outputs.cache-hit == 'true' && '1' || '0' }}
        run: mise run test-e2e-nightly

      - name: Verify production service worker and offline isolation
        run: npm --prefix packages/rom-weaver-webapp run verify:sw:no-coop-coep

      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-failure-evidence
          path: |
            packages/rom-weaver-webapp/tests/wasm/__screenshots__/**
            test-results/**
          if-no-files-found: ignore

  # The published install paths, exercised against the real latest release the
  # way a user would. Every one of these is a channel nothing else covers: CI
  # tests the scripts hermetically with stubbed downloads, and the release
  # workflow tests the publish step, but neither proves the artifact a user
  # actually receives runs. v0.6.7 shipped an npm package that could not start
  # at all; this is the check that would have said so the next morning.
  install-methods:
    name: Install via ${{ matrix.method }} (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - method: install.sh
            runner: ubuntu-24.04
          - method: install.sh
            runner: macos-14
          - method: install.ps1
            runner: windows-2025
          - method: npm
            runner: ubuntu-24.04
          - method: npm
            runner: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install and run
        shell: bash
        env:
          ROM_WEAVER_INSTALL_DIR: ${{ github.workspace }}/install
        run: |
          set -euo pipefail
          case "${{ matrix.method }}" in
            install.sh)
              sh install.sh
              "$ROM_WEAVER_INSTALL_DIR/rom-weaver" --version
              ;;
            install.ps1)
              pwsh -NoProfile -File install.ps1
              "$ROM_WEAVER_INSTALL_DIR/rom-weaver.exe" --version
              ;;
            npm)
              npm install --global rom-weaver
              rom-weaver --version
              ;;
          esac
