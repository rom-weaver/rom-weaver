name: E2E Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "41 7 * * *"

# Least privilege: this workflow only reads the repo. Declared explicitly so it
# does not inherit whatever the repository default happens to be.
permissions:
  contents: read

jobs:
  exhaustive:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      CARGO_TERM_COLOR: always
      WASI_SDK_VERSION: "33"
      WASI_SDK_SHA256: 0ba8b5bfaeb2adf3f29bab5841d76cf5318ab8e1642ea195f88baba1abd47bce
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes brotli cmake ninja-build pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          targets: wasm32-wasip1-threads

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install mise
        uses: jdx/mise-action@v4
        with:
          install: true

      - name: Install WASI SDK
        run: |
          curl --fail --location --show-error \
            --output "$RUNNER_TEMP/wasi-sdk.tar.gz" \
            "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux.tar.gz"
          echo "${WASI_SDK_SHA256}  $RUNNER_TEMP/wasi-sdk.tar.gz" | sha256sum --check
          tar --extract --gzip --file "$RUNNER_TEMP/wasi-sdk.tar.gz" --directory "$RUNNER_TEMP"
          echo "WASI_SDK_PATH=$RUNNER_TEMP/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux" >> "$GITHUB_ENV"

      - name: Install web dependencies
        run: |
          npm ci --prefix packages/rom-weaver-webapp
          npm --prefix packages/rom-weaver-webapp exec playwright install --with-deps chromium webkit

      - name: Run exhaustive E2E matrix
        run: mise run test-e2e-nightly

      - name: Verify production service worker and offline isolation
        run: npm --prefix packages/rom-weaver-webapp run verify:sw:no-coop-coep

      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-failure-evidence
          path: |
            packages/rom-weaver-webapp/tests/wasm/__screenshots__/**
            test-results/**
          if-no-files-found: ignore
