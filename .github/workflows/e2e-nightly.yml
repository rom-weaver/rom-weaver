name: E2E Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "41 7 * * *"

# Least privilege: this workflow only reads the repo. Declared explicitly so it
# does not inherit whatever the repository default happens to be.
permissions:
  contents: read

jobs:
  exhaustive:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # The nightly suite uses a dev wasm module (no wasm-opt/brotli), so it
      # cannot consume CI's production artifact. Cache the exact dev build
      # separately; unchanged scheduled runs skip its ~6.5 minute compile.
      - name: Restore development WASM module
        id: wasm-cache
        uses: ./.github/actions/wasm-cache
        with:
          variant: dev
          path: |
            packages/rom-weaver-webapp/src/wasm/rom-weaver-app.wasm
            packages/rom-weaver-webapp/src/wasm/NOTICE
            packages/rom-weaver-webapp/src/wasm/THIRD_PARTY_LICENSES.md
            packages/rom-weaver-webapp/src/wasm/third_party

      - uses: ./.github/actions/setup-build-env
        with:
          tools: node rust
          apt-packages: cmake ninja-build pkg-config clang libclang-dev
          rust-targets: wasm32-wasip1-threads
          wasi-sdk: "true"
          webapp-deps: "true"
          playwright: "true"
          playwright-browsers: chromium webkit

      - name: Verify cached development WASM artifact
        if: steps.wasm-cache.outputs.cache-hit == 'true'
        run: node scripts/wasm/verify-wasm-artifact.mjs packages/rom-weaver-webapp/src/wasm --dev

      - name: Run exhaustive E2E matrix
        env:
          ROM_WEAVER_E2E_SKIP_WASM_BUILD: ${{ steps.wasm-cache.outputs.cache-hit == 'true' && '1' || '0' }}
        run: mise run test-e2e-nightly

      - name: Verify production service worker and offline isolation
        run: npm --prefix packages/rom-weaver-webapp run verify:sw:no-coop-coep

      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-failure-evidence
          path: |
            packages/rom-weaver-webapp/tests/wasm/__screenshots__/**
            test-results/**
          if-no-files-found: ignore
