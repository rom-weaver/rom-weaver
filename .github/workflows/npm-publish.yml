name: Publish npm CLI

on:
  workflow_call:
    inputs:
      version:
        description: Release version without the v prefix
        required: true
        type: string
      sha:
        description: >-
          Commit to build from. The release tag does not exist while the release
          is still a draft, and github.ref points at main, which may already
          have moved past the released commit.
        required: true
        type: string
      cache-save:
        description: Save the Cargo cache after a miss.
        required: false
        default: false
        type: boolean
    secrets:
      NPM_BOOTSTRAP_TOKEN:
        description: One-time token for packages that cannot use trusted publishing yet.
        required: false
concurrency:
  group: npm-publish-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  platform-build:
    name: Build ${{ matrix.package }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: darwin-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            build: build
            binary: rom-weaver
          - package: darwin-x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            build: build
            binary: rom-weaver
          - package: linux-arm64-musl
            runner: ubuntu-24.04
            target: aarch64-unknown-linux-musl
            build: cross
            binary: rom-weaver
          - package: linux-ia32-musl
            runner: ubuntu-24.04
            target: i686-unknown-linux-musl
            build: cross
            binary: rom-weaver
          - package: linux-x64-gnu
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            build: build
            binary: rom-weaver
          - package: linux-x64-musl
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            build: cross
            binary: rom-weaver
          - package: win32-arm64-msvc
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            build: build
            binary: rom-weaver.exe
            msvc_arch: arm64
            msvc_host: arm64
          - package: win32-ia32-msvc
            runner: windows-2025
            target: i686-pc-windows-msvc
            build: build
            binary: rom-weaver.exe
            msvc_arch: x86
            msvc_host: amd64
          - package: win32-x64-msvc
            runner: windows-2025
            target: x86_64-pc-windows-msvc
            build: build
            binary: rom-weaver.exe
            msvc_arch: amd64
            msvc_host: amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.sha || format('v{0}', inputs.version) }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Main CI builds this same release target matrix, so releases restore its
      # caches without spending cache storage on a duplicate release-only set.
      # Keyed per matrix entry - the nine platforms share no artifacts.
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cli-platform-${{ matrix.package }}
          cache-on-failure: true
          save-if: ${{ inputs.cache-save }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes cmake ninja-build pkg-config

      - uses: taiki-e/install-action@v2
        if: matrix.build == 'cross'
        with:
          tool: cross@0.2.5

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Build native CLI
        if: runner.os != 'Windows' && matrix.build != 'cross'
        run: cargo build --locked --release --package rom-weaver-cli --target ${{ matrix.target }}

      - name: Build native CLI
        if: matrix.build == 'cross'
        run: cross build --locked --release --package rom-weaver-cli --target ${{ matrix.target }}

      - name: Build native CLI
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          for /f "usebackq delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -property installationPath`) do set "VSINSTALL=%%i"
          call "%VSINSTALL%\Common7\Tools\VsDevCmd.bat" -arch=${{ matrix.msvc_arch }} -host_arch=${{ matrix.msvc_host }}
          cargo build --locked --release --package rom-weaver-cli --target ${{ matrix.target }}

      - name: Prepare platform package
        run: >-
          node scripts/prepare-npm-platform-package.mjs ${{ matrix.package }}
          target/${{ matrix.target }}/release/${{ matrix.binary }}

      # Keep the compiled package outside the publish job. A failed npm or
      # release-asset step can then rerun without rebuilding Rust.
      - name: Upload platform package
        uses: actions/upload-artifact@v7
        with:
          name: npm-platform-${{ matrix.package }}
          path: packages/rom-weaver-cli-platforms/${{ matrix.package }}
          if-no-files-found: error
          overwrite: true
          retention-days: 7

      # The CLI image is linux/amd64 and consumes this exact binary rather than
      # compiling the workspace a second time.
      - name: Upload Linux binary for the container build
        if: matrix.package == 'linux-x64-gnu'
        uses: actions/upload-artifact@v7
        with:
          name: cli-binary-linux-x64-gnu
          path: packages/rom-weaver-cli-platforms/linux-x64-gnu/bin/rom-weaver
          if-no-files-found: error
          # Artifact names are immutable within a run and a re-run shares the
          # run's namespace, so without this the documented "rerun the failed
          # jobs" retry (.github/RELEASING.md) would 409 here on every attempt
          # and strand the draft. A rerun rebuilds the same released sha, and
          # publish-containers was skipped in the failed attempt, so nothing can
          # be reading the artifact while it is replaced.
          overwrite: true
          retention-days: 7

  platform-dry-run:
    name: Dry-run publish ${{ matrix.package }}
    needs: platform-build
    if: ${{ needs.platform-build.result == 'success' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: darwin-arm64
            runner: macos-14
          - package: darwin-x64
            runner: macos-15-intel
          - package: linux-arm64-musl
            runner: ubuntu-24.04-arm
          - package: linux-ia32-musl
            runner: ubuntu-24.04
          - package: linux-x64-gnu
            runner: ubuntu-24.04
          - package: linux-x64-musl
            runner: ubuntu-24.04
          - package: win32-arm64-msvc
            runner: windows-11-arm
          - package: win32-ia32-msvc
            runner: windows-2025
          - package: win32-x64-msvc
            runner: windows-2025
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.sha || format('v{0}', inputs.version) }}

      - name: Download platform package
        uses: actions/download-artifact@v8
        with:
          name: npm-platform-${{ matrix.package }}
          path: packages/rom-weaver-cli-platforms/${{ matrix.package }}

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Install npm dependencies
        run: npm install --package-lock=false --ignore-scripts --no-audit --no-fund

      - name: Dry-run platform package publish
        shell: bash
        run: node scripts/ci/npm-publish-package.mjs --dry-run packages/rom-weaver-cli-platforms/${{ matrix.package }}

  # A matrix dependency is a barrier over every matrix entry. No registry
  # publish starts unless all nine downloaded platform artifacts passed the
  # same publish helper in dry-run mode on their target operating systems.
  platform:
    name: Publish ${{ matrix.package }}
    needs: platform-dry-run
    if: ${{ needs.platform-dry-run.result == 'success' }}
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: darwin-arm64
            runner: macos-14
            bootstrap: false
          - package: darwin-x64
            runner: macos-15-intel
            bootstrap: false
          - package: linux-arm64-musl
            runner: ubuntu-24.04-arm
            bootstrap: false
          - package: linux-ia32-musl
            runner: ubuntu-24.04
            bootstrap: false
          - package: linux-x64-gnu
            runner: ubuntu-24.04
            bootstrap: false
          - package: linux-x64-musl
            runner: ubuntu-24.04
            bootstrap: false
          - package: win32-arm64-msvc
            runner: windows-11-arm
            bootstrap: false
          - package: win32-ia32-msvc
            runner: windows-2025
            bootstrap: false
          - package: win32-x64-msvc
            runner: windows-2025
            bootstrap: false
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.sha || format('v{0}', inputs.version) }}

      - name: Download platform package
        uses: actions/download-artifact@v8
        with:
          name: npm-platform-${{ matrix.package }}
          path: packages/rom-weaver-cli-platforms/${{ matrix.package }}

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Install npm dependencies
        run: npm install --package-lock=false --ignore-scripts --no-audit --no-fund

      - name: Publish platform package
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ matrix.bootstrap && secrets.NPM_BOOTSTRAP_TOKEN || '' }}
        run: |
          # ponytail: Set bootstrap: true only for an unpublished package, then
          # remove it after configuring that package's trusted publisher.
          if [[ "${{ matrix.bootstrap }}" == true && -z "$NODE_AUTH_TOKEN" ]]; then
            echo "::error::NPM_BOOTSTRAP_TOKEN is required for first publication"
            exit 1
          fi
          node scripts/ci/npm-publish-package.mjs packages/rom-weaver-cli-platforms/${{ matrix.package }}

      # After the npm publish, not before: npm is the irreversible half, so a
      # release-asset failure must not be able to skip it.
      - name: Upload platform binary to GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          package_path=packages/rom-weaver-cli-platforms/${{ matrix.package }}
          binary_path="$package_path/bin/rom-weaver"
          asset_name="rom-weaver-${{ matrix.package }}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            binary_path+=".exe"
            asset_name+=".exe"
          fi
          cp "$binary_path" "$asset_name"
          checksum=$(node -e \
            "const fs=require('fs'),c=require('crypto');process.stdout.write(c.createHash('sha256').update(fs.readFileSync(process.argv[1])).digest('hex'))" \
            "$asset_name")
          printf '%s  %s\n' "$checksum" "$asset_name" > "$asset_name.sha256"
          gh release upload "v${{ inputs.version }}" "$asset_name" "$asset_name.sha256" \
            --repo "$GITHUB_REPOSITORY" --clobber

  launcher:
    needs: platform
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.sha || format('v{0}', inputs.version) }}

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Install npm dependencies
        run: npm install --package-lock=false --ignore-scripts --no-audit --no-fund

      - name: Publish launcher package
        run: node scripts/ci/npm-publish-package.mjs

  # The unscoped `rom-weaver` name is a dependency-only alias for
  # @rom-weaver/cli, so it must publish after the launcher it points at -
  # otherwise installs resolve a version that is not on the registry yet.
  alias:
    needs: launcher
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.sha || format('v{0}', inputs.version) }}

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Install npm dependencies
        run: npm install --package-lock=false --ignore-scripts --no-audit --no-fund

      - name: Publish alias package
        run: |
          cp LICENSE.md packages/rom-weaver-alias/LICENSE.md
          node scripts/ci/npm-publish-package.mjs packages/rom-weaver-alias
