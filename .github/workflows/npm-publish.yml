name: Publish npm CLI

on:
  workflow_call:
    inputs:
      version:
        description: Release version without the v prefix
        required: true
        type: string
    secrets:
      NPM_TOKEN:
        description: npm automation token for the CLI packages
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix
        required: true
        type: string
concurrency:
  group: npm-publish-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  platform:
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: darwin-arm64
            runner: macos-14
          - package: darwin-x64
            runner: macos-15-intel
          - package: linux-x64-gnu
            runner: ubuntu-24.04
          - package: win32-x64-msvc
            runner: windows-2025
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref }}
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes cmake ninja-build pkg-config

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Build native CLI
        run: cargo build --locked --release --package rom-weaver-cli

      - name: Prepare platform package
        run: node scripts/prepare-npm-platform-package.mjs ${{ matrix.package }}

      - name: Publish platform package
        shell: bash
        run: |
          package_path=packages/rom-weaver-cli-platforms/${{ matrix.package }}
          package_spec=$(node -p "const p = require('./$package_path/package.json'); p.name + '@' + p.version")
          # Test the version, never the spec: package names contain hyphens
          # (darwin-arm64, linux-x64-gnu), so a spec match would tag every
          # platform package as a prerelease.
          package_version=$(node -p "require('./$package_path/package.json').version")
          npm_tag=latest
          case "$package_version" in *-*) npm_tag=beta ;; esac
          echo "publishing $package_spec with dist-tag $npm_tag"
          if npm view "$package_spec" version >/dev/null 2>&1; then
            echo "$package_spec is already published"
          elif npm publish "$package_path" --ignore-scripts --access public --provenance --tag "$npm_tag"; then
            true
          elif npm view "$package_spec" version >/dev/null 2>&1; then
            echo "$package_spec was published by another run"
          else
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  launcher:
    needs: platform
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref }}

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Publish launcher package
        shell: bash
        run: |
          package_spec=$(node -p "const p = require('./package.json'); p.name + '@' + p.version")
          package_version=$(node -p "require('./package.json').version")
          npm_tag=latest
          case "$package_version" in *-*) npm_tag=beta ;; esac
          echo "publishing $package_spec with dist-tag $npm_tag"
          if npm view "$package_spec" version >/dev/null 2>&1; then
            echo "$package_spec is already published"
          elif npm publish --ignore-scripts --access public --provenance --tag "$npm_tag"; then
            true
          elif npm view "$package_spec" version >/dev/null 2>&1; then
            echo "$package_spec was published by another run"
          else
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # The unscoped `rom-weaver` name is a dependency-only alias for
  # @rom-weaver/cli, so it must publish after the launcher it points at -
  # otherwise installs resolve a version that is not on the registry yet.
  alias:
    needs: launcher
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref }}

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Publish alias package
        shell: bash
        run: |
          package_path=packages/rom-weaver-alias
          cp LICENSE.md "$package_path/LICENSE.md"
          package_spec=$(node -p "const p = require('./$package_path/package.json'); p.name + '@' + p.version")
          package_version=$(node -p "require('./$package_path/package.json').version")
          npm_tag=latest
          case "$package_version" in *-*) npm_tag=beta ;; esac
          echo "publishing $package_spec with dist-tag $npm_tag"
          if npm view "$package_spec" version >/dev/null 2>&1; then
            echo "$package_spec is already published"
          elif npm publish "$package_path" --ignore-scripts --access public --provenance --tag "$npm_tag"; then
            true
          elif npm view "$package_spec" version >/dev/null 2>&1; then
            echo "$package_spec was published by another run"
          else
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
