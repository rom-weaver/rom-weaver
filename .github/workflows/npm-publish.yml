name: Publish npm CLI

on:
  workflow_call:
    inputs:
      version:
        description: Release version without the v prefix
        required: true
        type: string
      sha:
        description: >-
          Commit to build from. The release tag does not exist while the release
          is still a draft, and github.ref points at main, which may already
          have moved past the released commit.
        required: true
        type: string
    secrets:
      NPM_TOKEN:
        description: npm automation token for the CLI packages
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix
        required: true
        type: string
concurrency:
  group: npm-publish-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  platform:
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: darwin-arm64
            runner: macos-14
          - package: darwin-x64
            runner: macos-15-intel
          - package: linux-x64-gnu
            runner: ubuntu-24.04
          - package: win32-x64-msvc
            runner: windows-2025
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.sha || format('v{0}', inputs.version) }}

      - uses: dtolnay/rust-toolchain@stable

      # Nothing on main builds --release, and CI is Linux-only, so there is no
      # upstream cache to seed from: this pays off from the second release
      # onward, when a tag run restores what the previous tag run saved.
      # Keyed per matrix entry - the four platforms share no artifacts.
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: npm-publish-${{ matrix.package }}
          cache-on-failure: true

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes cmake ninja-build pkg-config

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Build native CLI
        run: cargo build --locked --release --package rom-weaver-cli

      - name: Prepare platform package
        run: node scripts/prepare-npm-platform-package.mjs ${{ matrix.package }}

      # The CLI image is linux/amd64 and builds the identical
      # `cargo build --locked --release -p rom-weaver-cli` from the same commit,
      # so it consumes this instead of compiling a second time. A run artifact
      # rather than the release asset below: it is visible to a sibling job in
      # this run without depending on draft-release readability, and it is
      # uploaded here, before the npm publish, so a container build never waits
      # on the irreversible step.
      - name: Upload Linux binary for the container build
        if: matrix.package == 'linux-x64-gnu'
        uses: actions/upload-artifact@v5
        with:
          name: cli-binary-linux-x64-gnu
          path: packages/rom-weaver-cli-platforms/linux-x64-gnu/bin/rom-weaver
          if-no-files-found: error
          # Artifact names are immutable within a run and a re-run shares the
          # run's namespace, so without this the documented "rerun the failed
          # jobs" retry (.github/RELEASING.md) would 409 here on every attempt
          # and strand the draft. A rerun rebuilds the same released sha, and
          # publish-containers was skipped in the failed attempt, so nothing can
          # be reading the artifact while it is replaced.
          overwrite: true
          retention-days: 7

      - name: Publish platform package
        shell: bash
        run: node scripts/ci/npm-publish-package.mjs packages/rom-weaver-cli-platforms/${{ matrix.package }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # After the npm publish, not before: npm is the irreversible half, so a
      # release-asset failure must not be able to skip it.
      - name: Upload platform binary to GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          package_path=packages/rom-weaver-cli-platforms/${{ matrix.package }}
          binary_path="$package_path/bin/rom-weaver"
          asset_name="rom-weaver-${{ matrix.package }}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            binary_path+=".exe"
            asset_name+=".exe"
          fi
          cp "$binary_path" "$asset_name"
          checksum=$(node -e \
            "const fs=require('fs'),c=require('crypto');process.stdout.write(c.createHash('sha256').update(fs.readFileSync(process.argv[1])).digest('hex'))" \
            "$asset_name")
          printf '%s  %s\n' "$checksum" "$asset_name" > "$asset_name.sha256"
          gh release upload "v${{ inputs.version }}" "$asset_name" "$asset_name.sha256" \
            --repo "$GITHUB_REPOSITORY" --clobber

  launcher:
    needs: platform
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.sha || format('v{0}', inputs.version) }}

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Publish launcher package
        run: node scripts/ci/npm-publish-package.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # The unscoped `rom-weaver` name is a dependency-only alias for
  # @rom-weaver/cli, so it must publish after the launcher it points at -
  # otherwise installs resolve a version that is not on the registry yet.
  alias:
    needs: launcher
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.sha || format('v{0}', inputs.version) }}

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Publish alias package
        run: |
          cp LICENSE.md packages/rom-weaver-alias/LICENSE.md
          node scripts/ci/npm-publish-package.mjs packages/rom-weaver-alias
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
