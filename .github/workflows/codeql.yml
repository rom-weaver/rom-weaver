name: CodeQL

# Non-blocking TypeScript and Rust analysis. Source-only mode avoids rebuilding native C
# dependencies and the WASI SDK already covered by CI.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "**/*.cjs"
      - "**/*.js"
      - "**/*.mjs"
      - "**/*.rs"
      - "**/*.ts"
      - "**/*.tsx"
      - "Cargo.lock"
      - "Cargo.toml"
      - "package-lock.json"
      - "package.json"
      - "packages/package-lock.json"
      - "packages/package.json"
      - "packages/rom-weaver-wasm/package.json"
      - "packages/rom-weaver-webapp/package.json"
      - ".github/codeql/**"
      - ".github/workflows/codeql.yml"
  schedule:
    # 05:27 UTC weekly, off the hour to dodge scheduler congestion.
    - cron: "27 5 * * 1"

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      # security-events: write is what lets the run upload SARIF to the Security
      # tab; the rest stay read-only.
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
          - language: rust
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          # Rule exclusions live in the config file so each carries a written reason.
          config-file: .github/codeql/codeql-config.yml

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
