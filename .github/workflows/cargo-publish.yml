name: Publish Cargo crates

on:
  workflow_call:
    inputs:
      version:
        description: Release version without the v prefix
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix
        required: true
        type: string
concurrency:
  group: cargo-publish-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref }}
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - id: crates-io-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install --yes clang cmake libclang-dev ninja-build pkg-config

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@cargo-semver-checks

      - name: Check for accidental breaking API changes
        shell: bash
        # Runs per-crate rather than --workspace so a crate with no published
        # baseline (first release, or a newly added crate) is skipped instead of
        # failing the whole job. cargo-semver-checks compares the working tree
        # against the latest release on crates.io; a major-version bump is the
        # intended way to land a genuine break.
        run: |
          mapfile -t names < <(
            cargo metadata --no-deps --format-version 1 |
              jq --raw-output '
                .workspace_members as $members
                | .packages[]
                | select(.id as $id | $members | index($id))
                | select(.publish != [])
                | .name
              '
          )

          for name in "${names[@]}"; do
            status=$(curl --silent --output /dev/null --write-out '%{http_code}' \
              --user-agent "$CRATES_IO_USER_AGENT" \
              "https://crates.io/api/v1/crates/$name")
            if [[ "$status" != 200 ]]; then
              echo "::notice::$name has no published baseline yet - skipping semver check"
              continue
            fi
            cargo semver-checks check-release --package "$name"
          done
        env:
          CRATES_IO_USER_AGENT: rom-weaver-release-workflow (https://github.com/${{ github.repository }})

      - name: Publish workspace crates
        shell: bash
        run: |
          mapfile -t packages < <(
            cargo metadata --no-deps --format-version 1 |
              jq --raw-output '
                .workspace_members as $members
                | .packages[]
                | select(.id as $id | $members | index($id))
                | select(.publish != [])
                | [.name, .version]
                | @tsv
              '
          )

          missing=()
          for package in "${packages[@]}"; do
            IFS=$'\t' read -r name version <<< "$package"
            status=$(curl --silent --output /dev/null --write-out '%{http_code}' \
              --user-agent "$CRATES_IO_USER_AGENT" \
              "https://crates.io/api/v1/crates/$name/$version")
            case "$status" in
              200) echo "$name@$version is already published" ;;
              404) missing+=("$package") ;;
              *) echo "crates.io returned HTTP $status for $name@$version" >&2; exit 1 ;;
            esac
          done

          if (( ${#missing[@]} == 0 )); then
            echo "All workspace crates are already published"
            exit 0
          fi

          publish_args=()
          for package in "${missing[@]}"; do
            publish_args+=(--package "${package%%$'\t'*}")
          done

          if cargo publish "${publish_args[@]}" --locked; then
            exit 0
          fi

          # A concurrent run may have won the publish race. Only accept the
          # failure when every requested version now exists in the registry.
          for package in "${missing[@]}"; do
            IFS=$'\t' read -r name version <<< "$package"
            status=$(curl --silent --output /dev/null --write-out '%{http_code}' \
              --user-agent "$CRATES_IO_USER_AGENT" \
              "https://crates.io/api/v1/crates/$name/$version")
            if [[ "$status" != 200 ]]; then
              exit 1
            fi
          done
          echo "All workspace crates were published by another run"
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
          CRATES_IO_USER_AGENT: rom-weaver-release-workflow (https://github.com/${{ github.repository }})
