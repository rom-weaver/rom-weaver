name: Publish Cargo crates

# Triggered by the release tag rather than called from release.yml: neither
# event release.yml runs on is one crates.io Trusted Publishing accepts.
# Ordinary commits reach it through `workflow_run` ("Trusted Publishing does not
# support the 'workflow_run' event trigger due to security concerns"), and the
# runs that set release_created arrive through `pull_request`, which it will not
# accept either. A job inherits its workflow's event. The tag only appears once
# release.yml publishes the draft, so this still runs strictly after the rest of
# the release succeeded.
on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix
        required: true
        type: string
concurrency:
  group: cargo-publish-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref }}

      - uses: dtolnay/rust-toolchain@stable

      - id: crates-io-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install --yes clang cmake libclang-dev ninja-build pkg-config

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-publish
          cache-on-failure: true

      # The cargo-semver-checks gate that used to sit here now runs in
      # release.yml, before the draft is published. By the time this workflow's
      # tag exists the release is immutable and the version is spent, so a
      # break found here could not be acted on.
      - name: Publish workspace crates
        shell: bash
        run: |
          mapfile -t packages < <(
            cargo metadata --no-deps --format-version 1 |
              jq --raw-output '
                .workspace_members as $members
                | .packages[]
                | select(.id as $id | $members | index($id))
                | select(.publish != [])
                | [.name, .version]
                | @tsv
              '
          )

          missing=()
          for package in "${packages[@]}"; do
            IFS=$'\t' read -r name version <<< "$package"
            status=$(curl --silent --output /dev/null --write-out '%{http_code}' \
              --user-agent "$CRATES_IO_USER_AGENT" \
              "https://crates.io/api/v1/crates/$name/$version")
            case "$status" in
              200) echo "$name@$version is already published" ;;
              404) missing+=("$package") ;;
              *) echo "crates.io returned HTTP $status for $name@$version" >&2; exit 1 ;;
            esac
          done

          if (( ${#missing[@]} == 0 )); then
            echo "All workspace crates are already published"
            exit 0
          fi

          publish_args=()
          for package in "${missing[@]}"; do
            publish_args+=(--package "${package%%$'\t'*}")
          done

          if cargo publish "${publish_args[@]}" --locked; then
            exit 0
          fi

          # A concurrent run may have won the publish race. Only accept the
          # failure when every requested version now exists in the registry.
          for package in "${missing[@]}"; do
            IFS=$'\t' read -r name version <<< "$package"
            status=$(curl --silent --output /dev/null --write-out '%{http_code}' \
              --user-agent "$CRATES_IO_USER_AGENT" \
              "https://crates.io/api/v1/crates/$name/$version")
            if [[ "$status" != 200 ]]; then
              exit 1
            fi
          done
          echo "All workspace crates were published by another run"
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
          CRATES_IO_USER_AGENT: rom-weaver-release-workflow (https://github.com/${{ github.repository }})
