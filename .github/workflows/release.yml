name: Release

on:
  workflow_dispatch:
  # Ordinary commits use the successful CI run to create/update the release PR.
  # A merged release PR already passed required checks, so use its close event
  # instead of waiting for a duplicate full CI run on the merge commit.
  pull_request:
    types: [closed]
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.merged == true &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        startsWith(github.event.pull_request.head.ref, 'release-please--branches--main--components--')
      ) ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        !startsWith(github.event.workflow_run.head_commit.message, 'chore(main): release ')
      )
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
      # release-please reports the commit the release targets. For merged
      # release PRs this is the merge commit, not necessarily the PR head.
      sha: ${{ steps.release.outputs.sha }}
      artifact_sha: ${{ steps.artifact-sha.outputs.sha }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          target-branch: main
          skip-github-pull-request: ${{ github.event_name == 'pull_request' }}

      - name: Resolve reusable artifact commit
        id: artifact-sha
        if: steps.release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          artifact_sha="$RELEASE_SHA"
          if [[ "$GITHUB_EVENT_NAME" == pull_request && -n "$PR_HEAD_SHA" ]]; then
            release_tree=$(gh api "repos/$GITHUB_REPOSITORY/git/commits/$RELEASE_SHA" --jq .tree.sha)
            head_tree=$(gh api "repos/$GITHUB_REPOSITORY/git/commits/$PR_HEAD_SHA" --jq .tree.sha)
            if [[ "$release_tree" == "$head_tree" ]]; then
              artifact_sha="$PR_HEAD_SHA"
            else
              echo "Release and pull request trees differ; requiring a release-commit artifact"
            fi
          fi
          echo "sha=$artifact_sha" >> "$GITHUB_OUTPUT"

      - name: Mark GitHub prerelease
        if: >-
          steps.release.outputs.release_created == 'true' &&
          contains(steps.release.outputs.version, '-')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "v${{ steps.release.outputs.version }}" \
            --repo "$GITHUB_REPOSITORY" \
            --prerelease

      - name: Find release pull request
        id: release-pr
        if: steps.release.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        shell: bash
        run: |
          read -r number branch < <(
            gh pr list \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --state open \
              --label 'autorelease: pending' \
              --json number,headRefName \
              --jq '.[0] | [.number, .headRefName] | @tsv'
          )
          test -n "$number" && test -n "$branch"
          echo "number=$number" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Checkout release pull request
        if: steps.release.outputs.prs_created == 'true'
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.release-pr.outputs.branch }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Sync generated release metadata
        if: steps.release.outputs.prs_created == 'true'
        env:
          RELEASE_PR_BRANCH: ${{ steps.release-pr.outputs.branch }}
        run: |
          set -euo pipefail
          node scripts/sync-version.mjs
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          if git diff --cached --quiet; then
            echo "Generated release metadata is already current"
            exit 0
          fi
          git commit -m "chore(release): sync generated metadata"
          git push origin "HEAD:$RELEASE_PR_BRANCH"

      - name: Aggregate prerelease changelog
        if: steps.release.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          RELEASE_PR: ${{ steps.release-pr.outputs.number }}
          RELEASE_PR_BRANCH: ${{ steps.release-pr.outputs.branch }}
        run: node scripts/aggregate-release-changelog.mjs

      # These PNGs belong in the release PR so the merge contains the exact
      # captures the release will ship. Do this only on PR creation; a later
      # workflow_run must not keep committing release-asset maintenance onto it.
      - name: Set up screenshot capture
        if: steps.release.outputs.prs_created == 'true'
        uses: ./.github/actions/setup-build-env
        with:
          tools: node ripgrep
          cargo-cache: "false"
          cache-save: "false"
          playwright: "true"
          webapp-deps: "true"

      - name: Resolve tested WASM artifact for screenshots
        if: steps.release.outputs.prs_created == 'true'
        id: screenshot-ci
        env:
          GH_TOKEN: ${{ github.token }}
          PREFERRED_RUN_ID: ${{ github.event.workflow_run.id }}
          TRIGGER_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          TARGET_SHA="$TRIGGER_SHA"
          [ -n "$TARGET_SHA" ] || TARGET_SHA=$(git rev-parse HEAD)
          export TARGET_SHA
          scripts/ci/resolve-wasm-run.sh

      - name: Download tested WASM artifact for screenshots
        if: steps.release.outputs.prs_created == 'true' && steps.screenshot-ci.outputs.available == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.screenshot-ci.outputs.run_id }}
        run: |
          gh run download "$RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name wasm-prod \
            --dir packages/rom-weaver-webapp/src/wasm

      - name: Set up fallback WASM build for screenshots
        if: steps.release.outputs.prs_created == 'true' && steps.screenshot-ci.outputs.available != 'true'
        uses: ./.github/actions/setup-build-env
        with:
          tools: node rust binaryen
          apt-packages: cmake ninja-build pkg-config clang libclang-dev
          rust-targets: wasm32-wasip1-threads
          wasi-sdk: "true"
          cache-save: "false"

      - name: Build fallback WASM for screenshots
        if: steps.release.outputs.prs_created == 'true' && steps.screenshot-ci.outputs.available != 'true'
        run: mise run build-wasm-prod

      - name: Verify WASM for screenshots
        if: steps.release.outputs.prs_created == 'true'
        run: node scripts/wasm/verify-wasm-artifact.mjs packages/rom-weaver-webapp/src/wasm

      - name: Build production webapp for screenshots
        if: steps.release.outputs.prs_created == 'true'
        env:
          ROM_WEAVER_CHANNEL: prod
        run: npm --prefix packages/rom-weaver-webapp run build

      - name: Capture release screenshots
        if: steps.release.outputs.prs_created == 'true'
        run: |
          set -euo pipefail
          node packages/rom-weaver-webapp/scripts/dev-server.mjs preview --port 4173 > screenshot-server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          ready=false
          for _ in {1..30}; do
            if curl --fail --silent --show-error --insecure --output /dev/null https://localhost:4173/; then
              ready=true
              break
            fi
            sleep 1
          done
          if [ "$ready" != true ]; then
            cat screenshot-server.log
            exit 1
          fi
          npm --prefix packages/rom-weaver-webapp run capture:screenshots

      - name: Commit release screenshots
        if: steps.release.outputs.prs_created == 'true'
        env:
          RELEASE_PR_BRANCH: ${{ steps.release-pr.outputs.branch }}
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/rom-weaver-webapp/design/*-{desktop,mobile}-{light,dark}.png
          if git diff --cached --quiet; then
            echo "Release screenshots are already current"
            exit 0
          fi
          git commit -m "docs(screenshots): refresh release captures"
          git push origin "HEAD:$RELEASE_PR_BRANCH"

  # Lives here rather than in cargo-publish.yml, where it used to run, because
  # there it was too late to act on: cargo-publish.yml is triggered by the
  # release tag, which only exists once the draft has been published and made
  # immutable. A break found at that point left the release out, the crates
  # unpublished, and the version unrepeatable. Here it gates publish-release, so
  # a failure leaves a deletable draft and the version free to be cut again.
  #
  # Safe to run alongside the publishing jobs: it publishes nothing, so it needs
  # no registry credentials and cannot half-release anything on failure.
  semver-check:
    name: Check for breaking API changes
    needs: release
    if: needs.release.outputs.release_created == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      # Cache reservation needs a writable scope; contents:read alone is denied
      # by the cache service ("token has no writable scopes").
      actions: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release.outputs.sha }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install --yes clang cmake libclang-dev ninja-build pkg-config

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-publish
          cache-on-failure: true

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@cargo-semver-checks

      # semver-checks builds rustdoc for each crate's published baseline before
      # it can diff. Baselines only change when a version is released, so this
      # survives across releases even though the current-tree half does not.
      - name: Cache cargo-semver-checks baselines
        uses: actions/cache@v6
        with:
          path: ~/.cache/cargo-semver-checks
          key: semver-checks-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            semver-checks-${{ runner.os }}-

      - name: Check for accidental breaking API changes
        shell: bash
        # Runs per-crate rather than --workspace so a crate with no published
        # baseline (first release, or a newly added crate) is skipped instead of
        # failing the whole job. cargo-semver-checks compares the working tree
        # against the latest release on crates.io; a major-version bump is the
        # intended way to land a genuine break.
        run: |
          mapfile -t names < <(
            cargo metadata --no-deps --format-version 1 |
              jq --raw-output '
                .workspace_members as $members
                | .packages[]
                | select(.id as $id | $members | index($id))
                | select(.publish != [])
                | .name
              '
          )

          for name in "${names[@]}"; do
            status=$(curl --silent --output /dev/null --write-out '%{http_code}' \
              --user-agent "$CRATES_IO_USER_AGENT" \
              "https://crates.io/api/v1/crates/$name")
            if [[ "$status" != 200 ]]; then
              echo "::notice::$name has no published baseline yet - skipping semver check"
              continue
            fi
            cargo semver-checks check-release --package "$name"
          done
        env:
          CRATES_IO_USER_AGENT: rom-weaver-release-workflow (https://github.com/${{ github.repository }})

  cargo-publish-dry-run:
    name: Dry-run Cargo publish
    needs: release
    if: needs.release.outputs.release_created == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release.outputs.sha }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Dry-run publish workspace crates
        # Package each crate exactly as cargo publish would, without uploading.
        # This intentionally does not authenticate with crates.io: release.yml
        # is not an accepted Trusted Publishing workflow for real Cargo
        # publishes, but dry-run validation does not need a registry token.
        # The CI Rust jobs already compile the local dependency graph. Skip
        # cargo's per-package verification here because it resolves same-version
        # workspace dependencies from crates.io, which may still contain the
        # previous release graph.
        run: cargo publish --workspace --locked --dry-run --no-verify

  # Package the static site beside the registry publishes rather than making all
  # of them wait for another production WASM build. The release PR head's CI
  # artifact is reused when its tree matches; otherwise build from release source.
  static-webapp:
    name: Package static webapp
    needs: release
    if: needs.release.outputs.release_created == 'true'
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write
    steps:
      # The release is still a draft here, so its tag does not exist yet - check
      # out the commit release-please released instead.
      - name: Checkout release commit
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release.outputs.sha }}
          fetch-depth: 0

      - name: Resolve tested WASM artifact
        id: ci
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ needs.release.outputs.artifact_sha }}
          PREFERRED_RUN_ID: ${{ github.event.workflow_run.id }}
        # A release PR artifact is reused only when its tree exactly matches the
        # released commit; otherwise resolution falls back to a source build.
        run: scripts/ci/resolve-wasm-run.sh

      - name: Set up static webapp build
        uses: ./.github/actions/setup-build-env
        with:
          tools: node ripgrep
          cargo-cache: "false"
          cache-save: "false"
          webapp-deps: "true"

      - name: Download tested WASM artifact
        if: steps.ci.outputs.available == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.ci.outputs.run_id }}
        run: |
          gh run download "$RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name wasm-prod \
            --dir packages/rom-weaver-webapp/src/wasm

      - name: Set up fallback WASM build
        if: steps.ci.outputs.available != 'true'
        uses: ./.github/actions/setup-build-env
        with:
          tools: node rust binaryen
          apt-packages: cmake ninja-build pkg-config clang libclang-dev
          rust-targets: wasm32-wasip1-threads
          wasi-sdk: "true"
          cache-save: "false"

      - name: Build fallback WASM artifact
        if: steps.ci.outputs.available != 'true'
        run: mise run build-wasm-prod

      - name: Verify WASM artifact
        run: node scripts/wasm/verify-wasm-artifact.mjs packages/rom-weaver-webapp/src/wasm

      # An unset channel builds as prod, which is right for a bare vX.Y.Z. A
      # prerelease has to be marked, though: its image and tarball would
      # otherwise claim production while the deploy ladder is putting the same
      # commit on beta.rom-weaver.com. Keyed off the hyphen, like the rest of
      # the prerelease routing (the GitHub prerelease flag, the npm dist-tag,
      # and the docker series tags). The label follows the channel on its own.
      - name: Package static webapp release asset
        env:
          ROM_WEAVER_CHANNEL: ${{ contains(needs.release.outputs.version, '-') && 'beta' || 'prod' }}
        run: |
          npm --prefix packages/rom-weaver-webapp run build
          if rg --files --no-ignore packages/rom-weaver-webapp/dist | rg -q '\.(br|gz)$'; then
            echo 'webapp release build unexpectedly contains .br/.gz sidecars' >&2
            exit 1
          fi
          tar --create --gzip \
            --file rom-weaver-webapp.tar.gz \
            --directory packages/rom-weaver-webapp/dist .
          sha256sum rom-weaver-webapp.tar.gz > rom-weaver-webapp.tar.gz.sha256

      # Consumed by the webapp image, which would otherwise install rustup, the
      # WASI SDK and binaryen and rebuild the same bundle from scratch. Sharing
      # it also lets Docker generate its own server-side compression siblings.
      - name: Upload static webapp bundle for the container build
        uses: actions/upload-artifact@v7
        with:
          name: webapp-dist
          path: packages/rom-weaver-webapp/dist
          if-no-files-found: error
          # dist has no dot-prefixed entries today, but upload-artifact drops
          # them silently by default - the day a `.well-known/` lands there the
          # tarball would keep it and the container would not, which is exactly
          # the divergence sharing this artifact exists to remove.
          include-hidden-files: true
          # See the matching upload in npm-publish.yml: an artifact name cannot
          # be reused within a run, so without this a rerun of a failed
          # static-webapp job 409s here instead of retrying.
          overwrite: true
          retention-days: 7

      - name: Upload static webapp release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "v${{ needs.release.outputs.version }}" \
            rom-weaver-webapp.tar.gz rom-weaver-webapp.tar.gz.sha256 \
            --repo "$GITHUB_REPOSITORY" --clobber

  publish-npm:
    needs: [release, cargo-publish-dry-run]
    if: >-
      needs.release.outputs.release_created == 'true' &&
      needs.cargo-publish-dry-run.result == 'success'
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/npm-publish.yml
    with:
      version: ${{ needs.release.outputs.version }}
      sha: ${{ needs.release.outputs.sha }}
      cache-save: false
    secrets:
      NPM_BOOTSTRAP_TOKEN: ${{ secrets.NPM_BOOTSTRAP_TOKEN }}

  # After publish-release, not before: the formula points at
  # releases/download/vX.Y.Z/... and a draft's assets are not publicly
  # downloadable, so pushing it earlier put a live formula in the tap whose URLs
  # 404 until the draft is published. This is also the safer half of the
  # tradeoff it costs - a failed formula push no longer holds the draft, and it
  # is the one publish in the fan-out that is trivially retryable, being a git
  # push to a repository we own rather than an irreversible registry write.
  publish-homebrew:
    needs: [release, publish-release]
    if: >-
      needs.release.outputs.release_created == 'true' &&
      !contains(needs.release.outputs.version, '-')
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release.outputs.sha }}

      - name: Download darwin arm64 package
        uses: actions/download-artifact@v8
        with:
          name: npm-platform-darwin-arm64
          path: platform-artifacts/darwin-arm64

      - name: Download darwin x64 package
        uses: actions/download-artifact@v8
        with:
          name: npm-platform-darwin-x64
          path: platform-artifacts/darwin-x64

      - name: Download linux x64 package
        uses: actions/download-artifact@v8
        with:
          name: npm-platform-linux-x64-gnu
          path: platform-artifacts/linux-x64-gnu

      - name: Download linux arm64 package
        uses: actions/download-artifact@v8
        with:
          name: npm-platform-linux-arm64-musl
          path: platform-artifacts/linux-arm64-musl

      - name: Calculate release checksums
        run: |
          set -euo pipefail
          mkdir checksums
          for platform in darwin-arm64 darwin-x64 linux-arm64-musl linux-x64-gnu; do
            binary="platform-artifacts/$platform/bin/rom-weaver"
            test -f "$binary"
            checksum="$(sha256sum "$binary" | cut -d ' ' -f 1)"
            printf '%s  rom-weaver-%s\n' "$checksum" "$platform" > \
              "checksums/rom-weaver-$platform.sha256"
          done

      - name: Checkout Homebrew tap
        uses: actions/checkout@v7
        with:
          repository: rom-weaver/homebrew-tap
          token: ${{ secrets.PACKAGE_MANAGER_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: node scripts/generate-homebrew-formula.mjs "$VERSION" checksums homebrew-tap/Formula/rom-weaver.rb

      - name: Publish formula
        working-directory: homebrew-tap
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Formula/rom-weaver.rb
          git diff --cached --quiet && exit 0
          git commit -m "rom-weaver $VERSION"
          git push

  # Windows counterpart to publish-homebrew, with the same ordering and the same
  # prerelease skip: a bucket has one manifest per package, so publishing a beta
  # there would hand it to every stable user.
  publish-scoop:
    needs: [release, publish-release]
    if: >-
      needs.release.outputs.release_created == 'true' &&
      !contains(needs.release.outputs.version, '-')
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release.outputs.sha }}

      - name: Download win32 arm64 package
        uses: actions/download-artifact@v8
        with:
          name: npm-platform-win32-arm64-msvc
          path: platform-artifacts/win32-arm64-msvc

      - name: Download win32 ia32 package
        uses: actions/download-artifact@v8
        with:
          name: npm-platform-win32-ia32-msvc
          path: platform-artifacts/win32-ia32-msvc

      - name: Download win32 x64 package
        uses: actions/download-artifact@v8
        with:
          name: npm-platform-win32-x64-msvc
          path: platform-artifacts/win32-x64-msvc

      - name: Calculate release checksums
        run: |
          set -euo pipefail
          mkdir checksums
          for platform in win32-arm64-msvc win32-ia32-msvc win32-x64-msvc; do
            asset="rom-weaver-$platform.exe"
            binary="platform-artifacts/$platform/bin/rom-weaver.exe"
            test -f "$binary"
            printf '%s  %s\n' "$(sha256sum "$binary" | cut -d ' ' -f 1)" "$asset" > \
              "checksums/$asset.sha256"
          done

      - name: Checkout Scoop bucket
        uses: actions/checkout@v7
        with:
          repository: rom-weaver/scoop-bucket
          token: ${{ secrets.PACKAGE_MANAGER_TOKEN }}
          path: scoop-bucket

      - name: Update manifest
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: node scripts/generate-scoop-manifest.mjs "$VERSION" checksums scoop-bucket/bucket/rom-weaver.json

      - name: Publish manifest
        working-directory: scoop-bucket
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add bucket/rom-weaver.json
          git diff --cached --quiet && exit 0
          git commit -m "rom-weaver $VERSION"
          git push

  # Both images are assembled from artifacts these two jobs produce, so this now
  # runs after them instead of beside them. The serialization is bought back
  # several times over: the webapp image no longer builds a toolchain and a wasm
  # module of its own, and the CLI image no longer compiles the workspace.
  # docker-publish falls back to building from source if either artifact is
  # missing, which is what a standalone workflow_dispatch gets.
  publish-containers:
    needs: [release, static-webapp, publish-npm]
    if: needs.release.outputs.release_created == 'true'
    permissions:
      # Belt and braces for the artifact download in docker-publish.yml. A
      # same-run download authenticates with the runner's ACTIONS_RUNTIME_TOKEN
      # rather than GITHUB_TOKEN, so this is not believed to be load-bearing
      # today - but a reusable workflow gets the caller job's token and never
      # more, so if that ever changes the grant has to exist in both places or
      # the download fails and both images quietly rebuild from source.
      actions: read
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
      packages: write
    uses: ./.github/workflows/docker-publish.yml
    with:
      version: ${{ needs.release.outputs.version }}
      sha: ${{ needs.release.outputs.sha }}

  # Publishing the draft is what creates the tag and stamps the release
  # immutable, so every job that attaches an asset has to come first: assets can
  # only be attached while the release is still a draft. A failure in any of
  # them leaves the draft in place, which is deletable and frees the version to
  # be cut again - a published immutable release permanently reserves its tag
  # name. Creating the tag here is also what triggers cargo-publish.yml.
  #
  # publish-homebrew and publish-scoop deliberately run *after* this rather than
  # gating it; see the comment on publish-homebrew.
  publish-release:
    name: Publish draft release
    needs: [release, semver-check, cargo-publish-dry-run, static-webapp, publish-npm, publish-containers]
    if: >-
      always() &&
      needs.release.outputs.release_created == 'true' &&
      needs.semver-check.result == 'success' &&
      needs.cargo-publish-dry-run.result == 'success' &&
      needs.static-webapp.result == 'success' &&
      needs.publish-npm.result == 'success' &&
      needs.publish-containers.result == 'success'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      # Deliberately not github.token: a tag push made with GITHUB_TOKEN does not
      # start new workflow runs, so cargo-publish.yml would never fire.
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          gh release edit "v${{ needs.release.outputs.version }}" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false
