name: Release

on:
  workflow_dispatch:
  # Gated on CI rather than `push: main` so a red pipeline can never reach
  # crates.io, npm, or ghcr - those publishes are irreversible.
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Checkout release tag for static webapp
        if: steps.release.outputs.release_created == 'true'
        uses: actions/checkout@v7
        with:
          ref: v${{ steps.release.outputs.version }}
          fetch-depth: 0
          submodules: recursive

      - name: Set up static webapp build
        if: steps.release.outputs.release_created == 'true'
        uses: ./.github/actions/setup-build-env
        with:
          apt-packages: cmake ninja-build pkg-config clang libclang-dev
          rust-targets: wasm32-wasip1-threads
          wasi-sdk: "true"
          webapp-deps: "true"

      - name: Package static webapp release asset
        if: steps.release.outputs.release_created == 'true'
        run: |
          mise run build-wasm-prod
          npm --prefix packages/rom-weaver-webapp run build
          tar --create --gzip \
            --file rom-weaver-webapp.tar.gz \
            --directory packages/rom-weaver-webapp/dist .
          sha256sum rom-weaver-webapp.tar.gz > rom-weaver-webapp.tar.gz.sha256

      - name: Upload static webapp release asset
        if: steps.release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "v${{ steps.release.outputs.version }}" \
            rom-weaver-webapp.tar.gz rom-weaver-webapp.tar.gz.sha256 \
            --repo "$GITHUB_REPOSITORY" --clobber

      - name: Mark GitHub prerelease
        if: >-
          steps.release.outputs.release_created == 'true' &&
          contains(steps.release.outputs.version, '-')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "v${{ steps.release.outputs.version }}" \
            --repo "$GITHUB_REPOSITORY" \
            --prerelease

      - name: Find release pull request
        id: release-pr
        if: steps.release.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        shell: bash
        run: |
          read -r number branch < <(
            gh pr list \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --state open \
              --label 'autorelease: pending' \
              --json number,headRefName \
              --jq '.[0] | [.number, .headRefName] | @tsv'
          )
          test -n "$number" && test -n "$branch"
          echo "number=$number" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Checkout release pull request
        if: steps.release.outputs.prs_created == 'true'
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.release-pr.outputs.branch }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Aggregate prerelease changelog
        if: steps.release.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          RELEASE_PR: ${{ steps.release-pr.outputs.number }}
          RELEASE_PR_BRANCH: ${{ steps.release-pr.outputs.branch }}
        run: node scripts/aggregate-release-changelog.mjs

  publish-cargo:
    needs: release
    if: needs.release.outputs.release_created == 'true'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/cargo-publish.yml
    with:
      version: ${{ needs.release.outputs.version }}

  publish-npm:
    needs: release
    if: needs.release.outputs.release_created == 'true'
    permissions:
      contents: write
      id-token: write
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    uses: ./.github/workflows/npm-publish.yml
    with:
      version: ${{ needs.release.outputs.version }}

  publish-containers:
    needs: release
    if: needs.release.outputs.release_created == 'true'
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
      packages: write
    uses: ./.github/workflows/docker-publish.yml
    with:
      version: ${{ needs.release.outputs.version }}
