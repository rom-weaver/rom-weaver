name: Release

on:
  workflow_dispatch:
  # Gated on CI rather than `push: main` so a red pipeline can never reach
  # crates.io, npm, or ghcr - those publishes are irreversible.
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  publish-cargo:
    needs: release
    if: needs.release.outputs.release_created == 'true'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/cargo-publish.yml
    with:
      version: ${{ needs.release.outputs.version }}

  publish-npm:
    needs: release
    if: needs.release.outputs.release_created == 'true'
    permissions:
      contents: read
      id-token: write
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    uses: ./.github/workflows/npm-publish.yml
    with:
      version: ${{ needs.release.outputs.version }}

  publish-containers:
    needs: release
    if: needs.release.outputs.release_created == 'true'
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
      packages: write
    uses: ./.github/workflows/docker-publish.yml
    with:
      version: ${{ needs.release.outputs.version }}
