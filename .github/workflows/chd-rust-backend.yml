name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      CARGO_TERM_COLOR: always
      WASI_SDK_VERSION: "33"
      WASI_SDK_SHA256: 0ba8b5bfaeb2adf3f29bab5841d76cf5318ab8e1642ea195f88baba1abd47bce
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install system dependencies
        # brotli has no pinnable mise binary; cmake/ninja/pkg-config build the
        # vendored C deps. node, wasm-opt, and ripgrep come from mise; the WASI SDK
        # is downloaded below (pinning it via mise would shadow clang on PATH and
        # break the libarchive-sys bindgen).
        run: |
          sudo apt-get update
          sudo apt-get install --yes brotli cmake ninja-build pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-wasip1-threads

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install mise (node, wasm-opt, ripgrep)
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Install WASI SDK
        run: |
          curl --fail --location --show-error \
            --output "$RUNNER_TEMP/wasi-sdk.tar.gz" \
            "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux.tar.gz"
          echo "${WASI_SDK_SHA256}  $RUNNER_TEMP/wasi-sdk.tar.gz" | sha256sum --check
          tar --extract --gzip --file "$RUNNER_TEMP/wasi-sdk.tar.gz" --directory "$RUNNER_TEMP"
          echo "WASI_SDK_PATH=$RUNNER_TEMP/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux" >> "$GITHUB_ENV"

      # Node comes from mise (.mise.toml [tools] node = "26.2.0"); cache npm downloads
      # since we no longer use setup-node's built-in cache.
      - name: Cache npm downloads
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json', 'packages/rom-weaver-react/package-lock.json', 'packages/rom-weaver-wasm/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install package dependencies
        run: |
          npm ci --prefix packages/rom-weaver-wasm
          npm ci --prefix packages/rom-weaver-react

      - name: Install browser test dependencies
        run: npm --prefix packages/rom-weaver-react exec playwright install --with-deps chromium

      - name: Rust format
        run: mise run fmt

      - name: Rust clippy
        run: mise run clippy

      - name: Rust typegen
        run: mise run typegen-check

      - name: WASM threaded check
        run: RUSTFLAGS="${RUSTFLAGS:-} -D warnings" mise run wasm-check

      - name: Whitespace
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [[ -n "$BASE_SHA" && "$BASE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            git diff --check "$BASE_SHA" "$HEAD_SHA"
          else
            git diff-tree --check --no-commit-id --exit-code -r "$HEAD_SHA"
          fi

      - name: Thread guard regressions
        run: mise run thread-guards

      - name: Rust tests
        run: mise run test-rust

      - name: WASM build
        run: mise run build-wasm-prod

      - name: rom-weaver-wasm checks
        run: |
          npm --prefix packages/rom-weaver-wasm run lint
          npm --prefix packages/rom-weaver-wasm test

      - name: rom-weaver-react checks
        run: |
          npm --prefix packages/rom-weaver-react run lint
          npm --prefix packages/rom-weaver-react test
          npm --prefix packages/rom-weaver-react run build
