name: CHD Rust Backend

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/chd-rust-backend.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/rom-weaver-cli/**"
      - "crates/rom-weaver-containers/**"
      - "crates/rom-weaver-chd-sys/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/chd-rust-backend.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/rom-weaver-cli/**"
      - "crates/rom-weaver-containers/**"
      - "crates/rom-weaver-chd-sys/**"

jobs:
  chd-rust-tests:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Container CHD tests (rust backend)
        run: cargo test -p rom-weaver-containers chd_ -- --nocapture

      - name: CLI CHD tests (rust backend)
        run: cargo test -p rom-weaver-cli chd_ -- --nocapture
