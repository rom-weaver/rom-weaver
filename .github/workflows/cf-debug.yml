name: CF Debug

# TEMPORARY. Diagnoses Cloudflare Pages API access without rebuilding wasm.
# Delete once the deploy pipeline is verified.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-24.04
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Which account is this
        run: |
          echo "--- account name (id is masked by Actions) ---"
          curl -sS "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            | jq '{name: .result.name, id_suffix: (.result.id[-6:]), success}'
          echo "--- pages projects in it ---"
          curl -sS "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            | jq '[.result[] | {name, subdomain, created_on}]'

      - name: Token verify
        run: |
          curl -sS https://api.cloudflare.com/client/v4/user/tokens/verify \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | head -c 800; echo

      - name: Account id shape
        run: |
          # Never prints the value; only whether it looks like a 32-char hex id.
          n=${#CLOUDFLARE_ACCOUNT_ID}
          echo "account id length=$n"
          case "$CLOUDFLARE_ACCOUNT_ID" in
            *[!0-9a-fA-F]*) echo "contains non-hex characters (likely wrong value)" ;;
            *) echo "looks like hex" ;;
          esac

      - name: List accounts the token can see
        run: |
          curl -sS https://api.cloudflare.com/client/v4/accounts \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            | head -c 1200; echo

      - name: List pages projects
        run: |
          curl -sS "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | head -c 1200; echo

      - name: Attempt project create
        run: |
          curl -sS -X POST "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"name":"rom-weaver-nightly","production_branch":"main"}' \
            | head -c 1200; echo

      # The real question: wrangler deploy is not replaceable by a curl, so if
      # the account-enumeration problem affects it too, the whole approach needs
      # rethinking. Deploys a throwaway page to the nightly project.
      - name: Attempt wrangler deploy
        run: |
          mkdir -p /tmp/probe
          echo '<!doctype html><title>probe</title>ok' > /tmp/probe/index.html
          npx --yes wrangler@4 pages deploy /tmp/probe \
            --project-name=rom-weaver-nightly \
            --branch=main 2>&1 | tail -20
