name: Deploy Web

# Publishes the webapp to Cloudflare Pages on three channels, each its own
# origin so OPFS / service-worker scope / Cache Storage stay isolated:
#
#   rom-weaver.com          <- release tags (vX.Y.Z)
#   beta.rom-weaver.com     <- prerelease tags (vX.Y.Z-alpha.N, -beta.N, ...)
#   nightly.rom-weaver.com  <- every push to main
#
# Pull requests additionally get a throwaway preview at
# pr-<n>.rom-weaver-preview.pages.dev. Previews are non-production deployments,
# so they never disturb a channel's live deployment.
#
# Artifacts are built here and pushed with wrangler Direct Upload, so
# Cloudflare never needs the WASI SDK and no Cloudflare build minutes are used.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      channel:
        description: Channel to deploy (overrides the ref-derived default)
        required: true
        default: nightly
        type: choice
        options: [nightly, beta, prod]

permissions:
  contents: read
  statuses: write

# Keyed by channel so a nightly build never cancels a production release.
concurrency:
  group: deploy-web-${{ github.event.inputs.channel || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    # Secrets are withheld from fork pull requests by design, so a fork preview
    # could only ever fail. Skip rather than fail noisily on every outside PR.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    env:
      CARGO_TERM_COLOR: always
      WASI_SDK_VERSION: "33"
      WASI_SDK_SHA256: 0ba8b5bfaeb2adf3f29bab5841d76cf5318ab8e1642ea195f88baba1abd47bce
      MISE_DISABLE_TOOLS: "aqua:WebAssembly/binaryen,aqua:BurntSushi/ripgrep,rust"
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      # A tag containing a hyphen after the version is a prerelease (v1.2.3-alpha.1)
      # and goes to beta; a bare vX.Y.Z goes to production.
      - name: Resolve channel
        id: channel
        run: |
          manual="${{ github.event.inputs.channel }}"
          if [ -n "$manual" ]; then
            channel="$manual"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            channel=preview
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            case "${GITHUB_REF_NAME}" in
              *-*) channel=beta ;;
              *)   channel=prod ;;
            esac
          else
            channel=nightly
          fi
          # `branch` is what makes a deployment production vs preview: wrangler
          # treats the project's production branch (main) as a live deploy and
          # anything else as a throwaway preview.
          branch=main
          case "$channel" in
            prod)    project=rom-weaver ;;
            beta)    project=rom-weaver-beta ;;
            nightly) project=rom-weaver-nightly ;;
            preview)
              project=rom-weaver-preview
              branch="pr-${{ github.event.number }}"
              ;;
            *) echo "::error::unknown channel '$channel'"; exit 1 ;;
          esac
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "project=$project" >> "$GITHUB_OUTPUT"
          echo "Deploying ref ${GITHUB_REF_NAME} to channel '$channel' (project '$project')"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes brotli cmake ninja-build pkg-config sccache clang libclang-dev
          lc="$(find /usr/lib /usr/lib64 -name 'libclang.so*' 2>/dev/null | head -n1)"
          [ -n "$lc" ] && echo "LIBCLANG_PATH=$(dirname "$lc")" >> "$GITHUB_ENV" || true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1-threads

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-v1-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-v1-

      - uses: jdx/mise-action@v4
        with:
          install: true

      - name: Install WASI SDK
        run: |
          SDK="$RUNNER_TEMP/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux"
          curl --fail --location --show-error \
            --output "$RUNNER_TEMP/wasi-sdk.tar.gz" \
            "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux.tar.gz"
          echo "${WASI_SDK_SHA256}  $RUNNER_TEMP/wasi-sdk.tar.gz" | sha256sum --check
          tar --extract --gzip --file "$RUNNER_TEMP/wasi-sdk.tar.gz" --directory "$RUNNER_TEMP"
          echo "WASI_SDK_PATH=$SDK" >> "$GITHUB_ENV"
          SYSROOT="$SDK/share/wasi-sysroot"
          INCDIR="$SYSROOT/include/wasm32-wasip1-threads"
          [ -f "$INCDIR/sys/stat.h" ] || INCDIR="$(dirname "$(dirname "$(find "$SYSROOT" -path '*/sys/stat.h' 2>/dev/null | head -n1)")")"
          echo "BINDGEN_EXTRA_CLANG_ARGS=-isystem $INCDIR -isystem $SYSROOT/include" >> "$GITHUB_ENV"

      - name: Install binaryen
        run: |
          BIN="$RUNNER_TEMP/binaryen-129"
          curl --fail --location --show-error \
            --output "$RUNNER_TEMP/binaryen.tar.gz" \
            "https://github.com/WebAssembly/binaryen/releases/download/version_129/binaryen-version_129-x86_64-linux.tar.gz"
          mkdir -p "$BIN"
          tar --extract --gzip --strip-components=1 --file "$RUNNER_TEMP/binaryen.tar.gz" --directory "$BIN"
          echo "$BIN/bin" >> "$GITHUB_PATH"

      - name: Install package dependencies
        run: npm ci --prefix packages/rom-weaver-webapp

      - name: Build WASM
        run: mise run build-wasm-prod

      - name: Build webapp
        run: npm --prefix packages/rom-weaver-webapp run build

      # Publish the bundle JSON Schema next to the site so its $id URL
      # (https://rom-weaver.com/rom-weaver-bundle.schema.json) resolves for editors.
      # Only production owns that URL; the other channels are not canonical.
      - name: Publish bundle JSON Schema
        if: steps.channel.outputs.channel == 'prod'
        run: cp docs/rom-weaver-bundle.schema.json packages/rom-weaver-webapp/dist/rom-weaver-bundle.schema.json

      # Idempotent, so the first run on a channel bootstraps its own project and
      # no local wrangler auth is ever needed.
      #
      # Uses the REST API rather than `wrangler pages project create`: wrangler
      # enumerates accounts internally, which a token scoped to specific account
      # resources cannot do, and it surfaces that as a bare "unknown error
      # [code: 8000000]" against an endpoint that works fine directly.
      - name: Ensure Cloudflare Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          project="${{ steps.channel.outputs.project }}"
          api="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects"
          body=$(curl -sS -X POST "$api" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"name\":\"${project}\",\"production_branch\":\"main\"}")
          if [ "$(printf '%s' "$body" | jq -r '.success')" = "true" ]; then
            echo "created Pages project '$project'"
          elif printf '%s' "$body" | jq -e '.errors[]? | select(.code == 8000002 or (.message | test("already exists"; "i")))' >/dev/null; then
            echo "Pages project '$project' already exists"
          else
            echo "unexpected response creating '$project':" >&2
            printf '%s\n' "$body" | jq . >&2 || printf '%s\n' "$body" >&2
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          npx --yes wrangler@4 pages deploy packages/rom-weaver-webapp/dist \
            --project-name="${{ steps.channel.outputs.project }}" \
            --branch="${{ steps.channel.outputs.branch }}" \
            --commit-hash="${GITHUB_SHA}" 2>&1 | tee /tmp/deploy.log
          url=$(grep -oE 'https://[a-z0-9.-]+\.pages\.dev' /tmp/deploy.log | tail -1)
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "deployed to $url"

      # Surfaced as a commit status rather than a comment, so the link lives in
      # the PR's checks list and updates in place instead of accreting comments.
      - name: Publish preview URL as a status check
        if: steps.channel.outputs.channel == 'preview' && steps.deploy.outputs.url != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ALIAS: https://${{ steps.channel.outputs.branch }}.rom-weaver-preview.pages.dev
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${{ github.event.pull_request.head.sha }}" \
            --method POST \
            --field state=success \
            --field context='preview/webapp' \
            --field target_url="${ALIAS}" \
            --field description='Preview deployment - click Details' \
            --silent
          echo "preview status -> ${ALIAS}"
