name: Conventional commits

# Only the pull request title is linted. Merge commits are disabled and squash
# merges take `PR_TITLE` as the subject, so the title is the only text that ever
# reaches `main` - and it is the only text Release Please reads. Individual
# branch commits are squashed away, so gating on them just failed contributors
# on a rule the pull request template never asked for.
on:
  pull_request:
    types: [edited, opened, reopened, synchronize]

# Release Please can edit the pull request within seconds. Keep only the newest
# validation for a ref instead of paying for each.
concurrency:
  group: commitlint-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  conventional-commits:
    name: Conventional commits
    # Only a title edit can change the outcome. Body and base edits cannot, but
    # every non-edited pull request event still reruns.
    if: >-
      github.event.action != 'edited' ||
      github.event.changes.title != null
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24.18.0
          cache: npm

      - name: Check pull request title
        env:
          PULL_REQUEST_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if printf '%s\n' "$PULL_REQUEST_TITLE" | npm exec --yes --package="@commitlint/cli@21.2.1" --package="@commitlint/config-conventional@21.2.0" -- commitlint; then
            exit 0
          fi

          echo '::error title=Invalid pull request title::Use Conventional Commits. See the check summary for valid types and scopes.'
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Invalid pull request title

          Rename the pull request using `type(scope): description` or `type: description`.

          Valid types: `build`, `chore`, `ci`, `docs`, `dx`, `feat`, `fix`, `perf`, `refactor`, `revert`, `style`, and `test`.

          A scope is optional. Any short scope naming the affected area is valid; common scopes include `app`, `bundle`, `ci`, `cli`, `commitlint`, `core`, `deps`, `docs`, `main`, `release`, `runtime`, `vendor`, `wasm`, and `webapp`.

          Example: `feat(webapp): add sample assets`

          The check will rerun automatically after the title is edited.
          EOF
          exit 1
