name: Commitlint

on:
  workflow_dispatch:
  pull_request:
    types: [edited, opened, reopened, synchronize]
  push:
    branches:
      - main

# Release Please can synchronize the branch and edit the pull request within
# seconds. Keep only the newest validation for a ref instead of paying for each.
concurrency:
  group: commitlint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  conventional-commits:
    name: Conventional commits
    # A body-only edit cannot change either condition checked below. Title and
    # base edits still rerun, as do every non-edited pull request event.
    if: >-
      github.event.action != 'edited' ||
      github.event.changes.title != null ||
      github.event.changes.base != null
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 24.18.0
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Check commits
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [[ -n "$BASE_SHA" && "$BASE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            npm exec -- commitlint --from "$BASE_SHA" --to "$HEAD_SHA"
          else
            npm exec -- commitlint --last
          fi

      - name: Check pull request title
        if: github.event_name == 'pull_request'
        env:
          PULL_REQUEST_TITLE: ${{ github.event.pull_request.title }}
        run: printf '%s\n' "$PULL_REQUEST_TITLE" | npm exec -- commitlint
