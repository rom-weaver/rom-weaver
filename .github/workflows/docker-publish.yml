name: Publish Docker images

on:
  workflow_call:
    inputs:
      version:
        description: Release version without the v prefix
        required: true
        type: string
      sha:
        description: >-
          Commit to build from. The release tag does not exist while the release
          is still a draft, and github.ref points at main, which may already
          have moved past the released commit.
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix
        required: true
        type: string

concurrency:
  group: docker-publish-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

permissions:
  # Read the run artifacts the npm and static-webapp jobs published.
  actions: read
  artifact-metadata: write
  attestations: write
  contents: read
  id-token: write
  packages: write

jobs:
  publish:
    name: Publish ${{ matrix.name }} image
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: CLI
            image: rom-weaver-cli
            context: .
            file: Dockerfile
            # Selects the Dockerfile's prebuilt stage, and names the run
            # artifact holding what that stage assembles the image from.
            build_arg: BINARY
            artifact: cli-binary-linux-x64-gnu
          - name: webapp
            image: rom-weaver-webapp
            context: .
            file: packages/rom-weaver-webapp/Dockerfile
            build_arg: DIST
            artifact: webapp-dist
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.sha || format('v{0}', inputs.version) }}

      - uses: docker/setup-buildx-action@v4

      # Every image here was previously rebuilt from source even though the rest
      # of the fan-out had already produced the exact same output from the exact
      # same commit: the CLI binary from npm-publish and the webapp bundle from
      # the static-webapp job. Reusing them removes a full workspace compile and
      # a rustup + WASI-SDK + binaryen + wasm build from the release path, and
      # makes the published container and the published release asset the same
      # bytes rather than two independent builds that ought to agree.
      #
      # A standalone workflow_dispatch has no sibling jobs and so no artifacts;
      # that is not an error, it just falls back to building from source.
      - name: Download prebuilt artifact
        id: prebuilt
        continue-on-error: true
        uses: actions/download-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: prebuilt

      # The fallback is correct but slow, and it is otherwise invisible - a
      # release that quietly went back to compiling everything should say so.
      - name: Resolve build source
        id: source
        env:
          ARTIFACT: ${{ matrix.artifact }}
          # `sha` is supplied only by the release fan-out, and a reusable
          # workflow inherits its caller's event - so github.event_name cannot
          # tell the two entry points apart, but this can.
          EXPECTED: ${{ inputs.sha != '' }}
          NAME: ${{ matrix.name }}
          OUTCOME: ${{ steps.prebuilt.outcome }}
        run: |
          if [ "$OUTCOME" = success ]; then
            value=prebuilt
          else
            value=source
            if [ "$EXPECTED" = true ]; then
              echo "::warning::no ${ARTIFACT} artifact; rebuilding the ${NAME} image from source"
            fi
          fi
          echo "value=$value" >> "$GITHUB_OUTPUT"
          echo "building the ${NAME} image from ${value}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Normalizes the version (tags arrive as `v0.6.0`, workflow_dispatch as
      # `0.6.0`) and decides which moving tags are safe for this version.
      - name: Resolve tag policy
        id: policy
        run: |
          version="${{ inputs.version || github.ref_name }}"
          version="${version#v}"
          case "$version" in *-*) release=false ;; *) release=true ;; esac
          major="${version%%.*}"
          # `0` would float across 0.5 -> 0.6, which semver treats as breaking,
          # so the major series tag only starts at 1.0.0.
          if [ "$release" = true ] && [ "$major" != 0 ]; then major_tag=true; else major_tag=false; fi
          {
            echo "version=$version"
            echo "release=$release"
            echo "major_tag=$major_tag"
          } >> "$GITHUB_OUTPUT"
          echo "version=$version release=$release major_tag=$major_tag"

      - id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          # A prerelease must never move `latest` or a series tag, or
          # `docker pull rom-weaver` serves an alpha. Prereleases get `beta`
          # instead, mirroring the npm dist-tag and the beta web channel.
          tags: |
            type=semver,pattern={{version}},value=${{ steps.policy.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.policy.outputs.version }},enable=${{ steps.policy.outputs.release == 'true' }}
            type=semver,pattern={{major}},value=${{ steps.policy.outputs.version }},enable=${{ steps.policy.outputs.major_tag == 'true' }}
            type=raw,value=latest,enable=${{ steps.policy.outputs.release == 'true' }}
            type=raw,value=beta,enable=${{ steps.policy.outputs.release != 'true' }}

      # The build cache lives in the registry beside the images, not in
      # `type=gha`. This job only runs when a release pull request merges, and
      # Actions cache entries are evicted after seven days without a read, so a
      # gha cache was reliably cold by the next release - while `mode=max` still
      # wrote the whole layer graph, Rust builder stage included, into the 10 GiB
      # repository budget that `cache-cleanup.yml` exists to defend. Those
      # entries also sat outside its reach: it reaps closed-pull-request scopes,
      # and these were written on a tag. A registry cache costs no Actions
      # budget, never expires on a timer, and CI reads the same ref.
      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          build-args: ${{ matrix.build_arg }}=${{ steps.source.outputs.value }}
          labels: ${{ steps.metadata.outputs.labels }}
          platforms: linux/amd64
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.metadata.outputs.tags }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:buildcache
          # Only a source build has anything worth caching, and only a source
          # build produces the layer graph the CI image job restores. Exporting
          # a prebuilt graph here would overwrite `buildcache` with a handful of
          # cheap COPY layers and leave the next Dockerfile pull request to pay
          # a cold compile.
          cache-to: ${{ steps.source.outputs.value == 'source' && format('type=registry,ref=ghcr.io/{0}/{1}:buildcache,mode=max', github.repository_owner, matrix.image) || '' }}

      - name: Sign build provenance
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
