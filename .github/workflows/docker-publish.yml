name: Publish Docker images

on:
  workflow_call:
    inputs:
      version:
        description: Release version without the v prefix
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix
        required: true
        type: string

concurrency:
  group: docker-publish-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

permissions:
  artifact-metadata: write
  attestations: write
  contents: read
  id-token: write
  packages: write

jobs:
  publish:
    name: Publish ${{ matrix.name }} image
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: CLI
            image: rom-weaver-cli
            context: .
            file: Dockerfile
          - name: webapp
            image: rom-weaver-webapp
            context: .
            file: packages/rom-weaver-react/Dockerfile
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref }}
          submodules: recursive

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.version || github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version || github.ref_name }}
            type=raw,value=latest

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          labels: ${{ steps.metadata.outputs.labels }}
          platforms: linux/amd64
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.metadata.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Sign build provenance
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
