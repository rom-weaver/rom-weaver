name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

# Least privilege: this workflow only reads the repo. Declared explicitly so it
# does not inherit whatever the repository default happens to be.
permissions:
  contents: read

# Superseded pushes to a branch are pointless work; on main every commit is a
# release candidate, so those runs are allowed to finish.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Built once and shared. This is the single most expensive step in the
  # pipeline (~6.5 min), and it used to run identically in two jobs.
  wasm:
    name: WASM build
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-build-env
        with:
          apt-packages: brotli cmake ninja-build pkg-config clang libclang-dev
          rust-targets: wasm32-wasip1-threads
          wasi-sdk: "true"

      # -D warnings replaces the former standalone `wasm-check` step, which
      # type-checked only rom-weaver-containers for this target and cost a full
      # extra 4 min: its differing RUSTFLAGS gave it a separate fingerprint, so
      # it recompiled the whole dependency chain just to collect warnings.
      # Applying the flag to the build we already run covers a strict superset
      # (the entire app, not one crate) for free. Lint levels do not affect
      # codegen, so output bytes are unchanged.
      - name: Build production WASM
        run: RUSTFLAGS="${RUSTFLAGS:-} -D warnings" mise run build-wasm-prod

      # The wasm module and its brotli sibling are already compressed, so
      # re-compressing them into the artifact only burns time.
      - name: Upload WASM artifact
        uses: actions/upload-artifact@v7
        with:
          name: wasm-prod
          if-no-files-found: error
          compression-level: 0
          path: |
            packages/rom-weaver-webapp/src/wasm/rom-weaver-app.wasm
            packages/rom-weaver-webapp/src/wasm/rom-weaver-app.wasm.br
            packages/rom-weaver-webapp/src/wasm/rom-weaver-app.wasm.prod.sha256
            packages/rom-weaver-webapp/src/wasm/NOTICE
            packages/rom-weaver-webapp/src/wasm/THIRD_PARTY_LICENSES.md
            packages/rom-weaver-webapp/src/wasm/third_party

  # Everything that needs a host-profile Rust build and nothing from wasm, so
  # it runs concurrently with the wasm build instead of queueing behind it.
  rust:
    name: Rust
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # The whitespace check below diffs against the PR base.
          fetch-depth: 0
          submodules: recursive

      - uses: ./.github/actions/setup-build-env
        with:
          apt-packages: cmake ninja-build pkg-config clang libclang-dev
          rust-components: clippy rustfmt

      - name: Rust format
        run: mise run fmt

      - name: Rust clippy
        run: mise run clippy

      - name: Rust typegen
        run: mise run typegen-check

      - name: Whitespace
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [[ -n "$BASE_SHA" && "$BASE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            git diff --check "$BASE_SHA" "$HEAD_SHA"
          else
            git diff-tree --check --no-commit-id --exit-code -r "$HEAD_SHA"
          fi

      - name: Thread guard regressions
        run: mise run thread-guards

      # Node built-ins only - these cover scripts/, not the webapp, so they need
      # neither the webapp's node_modules nor the wasm artifact.
      - name: Build script tests
        run: npm test

      - name: Rust tests
        run: mise run test-rust

      - name: Third-party attribution bundle
        run: mise run licenses-check

      - name: Rust supply chain (advisories, licenses, sources)
        run: mise run deny

      - name: Unused Rust dependencies
        run: mise run machete

      - name: Verify publishable Rust packages
        # Package each crate exactly as cargo publish would, without uploading.
        # This catches missing direct dependencies and files absent from crates.io
        # tarballs before release automation runs.
        run: cargo publish --workspace --exclude rom-weaver-typegen --locked --dry-run
      - name: npm advisories
        run: |
          npm run audit:deps
          npm --prefix packages/rom-weaver-webapp run audit:deps

  # Consumes the prebuilt wasm module; compiles no Rust of its own.
  webapp:
    name: Webapp
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: wasm
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: ./.github/actions/setup-build-env
        with:
          cargo-cache: "false"
          webapp-deps: "true"
          playwright: "true"

      - name: Download WASM artifact
        uses: actions/download-artifact@v8
        with:
          name: wasm-prod
          path: packages/rom-weaver-webapp/src/wasm

      - name: Lint
        run: npm --prefix packages/rom-weaver-webapp run lint

      - name: Unit tests
        run: npm --prefix packages/rom-weaver-webapp run test:unit

      - name: Browser tests (wasm)
        run: npm --prefix packages/rom-weaver-webapp run test:browser:wasm

      - name: Browser tests (parallel)
        run: npm --prefix packages/rom-weaver-webapp run test:browser:parallel

      - name: Webapp E2E
        run: npm --prefix packages/rom-weaver-webapp run test:e2e:webapp

      - name: Build
        run: npm --prefix packages/rom-weaver-webapp run build

  # Coverage has no percentage threshold - it is reported, not enforced - so it
  # does not gate a merge and is kept off the pull-request critical path. It
  # still runs on every push to main, so the release candidates that matter are
  # covered, and on demand via workflow_dispatch.
  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    needs: wasm
    if: github.event_name != 'pull_request'
    env:
      CARGO_TERM_COLOR: always
      ROM_WEAVER_COVERAGE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-build-env
        with:
          apt-packages: cmake ninja-build pkg-config clang libclang-dev
          # llvm-tools-preview backs cargo-llvm-cov's instrumentation.
          rust-components: llvm-tools-preview
          webapp-deps: "true"
          playwright: "true"

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Download WASM artifact
        uses: actions/download-artifact@v8
        with:
          name: wasm-prod
          path: packages/rom-weaver-webapp/src/wasm

      - name: Rust coverage
        run: mise run coverage-rust

      - name: React unit coverage
        run: npm --prefix packages/rom-weaver-webapp run test:unit:coverage

      - name: React UI coverage
        run: npm --prefix packages/rom-weaver-webapp run test:browser:coverage

      - name: React wasm coverage
        run: npm --prefix packages/rom-weaver-webapp run test:browser:wasm:coverage

      - name: Coverage summary
        run: node scripts/coverage-summary.mjs

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: dist/coverage/**
          if-no-files-found: warn
