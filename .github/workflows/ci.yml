name: CI

on:
  workflow_dispatch:
    inputs:
      deploy_channel:
        description: Also deploy the webapp to this channel (none = test only)
        required: false
        default: none
        type: choice
        options: [none, nightly, beta, prod]
  pull_request:
  push:
    branches:
      - main
    # Release tags deploy the webapp; the test jobs below skip them, since the
    # commit being tagged already passed this same gate on main.
    tags: ["v*"]

# Least privilege: most of this workflow only reads the repo. The deploy job
# widens its own permissions rather than granting them workflow-wide.
permissions:
  contents: read

# Superseded pushes to a branch are pointless work; on main every commit is a
# release candidate, so those runs are allowed to finish.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  changes:
    name: Changes
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      rust: ${{ steps.classify.outputs.rust }}
      webapp: ${{ steps.classify.outputs.webapp }}
      security: ${{ steps.classify.outputs.security }}
      docker_cli: ${{ steps.classify.outputs.docker_cli }}
      docker_webapp: ${{ steps.classify.outputs.docker_webapp }}
      full: ${{ steps.classify.outputs.full }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: classify
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
          HEAD_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == workflow_dispatch || -z "$BASE_SHA" || "$BASE_SHA" == 0000000000000000000000000000000000000000 ]]; then
            scripts/ci/classify-changes.sh --all | tee -a "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! paths=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" 2>/dev/null); then
            echo "base $BASE_SHA is unreachable; classifying everything"
            scripts/ci/classify-changes.sh --all | tee -a "$GITHUB_OUTPUT"
            exit 0
          fi
          printf 'changed paths:\n%s\n' "${paths:-(none)}"
          printf '%s\n' "$paths" | scripts/ci/classify-changes.sh | tee -a "$GITHUB_OUTPUT"

  # Static analysis of the repository's own plumbing - workflows, shell
  # scripts, Dockerfiles. Compiles nothing and installs no language toolchain,
  # so it finishes in well under a minute and reports independently of the
  # build jobs instead of hiding behind them.
  repo-lint:
    name: Lint workflows + scripts + Dockerfiles
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: github.ref_type != 'tag'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: ./.github/actions/setup-build-env
        with:
          # actionlint shells out to shellcheck for `run:` blocks, so the two
          # are wanted together even though only one of them is named a step.
          tools: actionlint shellcheck hadolint
          cargo-cache: "false"

      - name: Workflows
        run: mise run actionlint

      - name: Shell scripts
        run: mise run shellcheck

      - name: Dockerfiles
        run: mise run hadolint

  # Images were previously built only by the release fan-out, so a Dockerfile
  # that no longer builds surfaced at the moment it blocked a publish. hadolint
  # above reads the Dockerfile; it does not run it.
  #
  # This job builds the images from source, and each leg is gated on its actual
  # inputs rather than running for unrelated changes. The CLI leg includes its
  # Cargo workspace sources, so its required check always exercises the image
  # when the binary changes. The webapp's source build remains image-plumbing
  # only because its release path is exercised by the prebuilt smoke below.
  #
  # Reusing CI's cached wasm here is not an option: the CLI image contains no
  # wasm at all (it is `cargo build --release -p rom-weaver-cli`), and for the
  # webapp `DIST=prebuilt` skips the whole builder stage - rustup, the WASI SDK
  # pins, binaryen - which is precisely the fragile half this job exists to
  # test. That path is covered instead, unconditionally and for free, by
  # the webapp prebuilt smoke below.
  docker:
    name: Docker build (${{ matrix.name }})
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: changes
    if: github.ref_type != 'tag'
    permissions:
      contents: read
      # Read to restore the cache; write so a merge to main can refresh it. A
      # pull request from a fork receives a read-only token regardless, which is
      # why the export below is restricted to pushes on main anyway.
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: CLI
            image: rom-weaver-cli
            file: Dockerfile
          - name: webapp
            image: rom-weaver-webapp
            file: packages/rom-weaver-webapp/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check whether the image plumbing changed
        id: gate
        env:
          CLI_SELECTED: ${{ needs.changes.outputs.docker_cli }}
          WEBAPP_SELECTED: ${{ needs.changes.outputs.docker_webapp }}
          IMAGE: ${{ matrix.name }}
        run: |
          set -euo pipefail
          if [[ "$IMAGE" == CLI ]]; then
            build=$CLI_SELECTED
          else
            build=$WEBAPP_SELECTED
          fi
          echo "build=$build" >> "$GITHUB_OUTPUT"
          echo "$IMAGE build selected: $build"

      - uses: docker/setup-buildx-action@v4
        if: steps.gate.outputs.build == 'true'

      - name: Log in to GitHub Container Registry
        if: steps.gate.outputs.build == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Never pushes an image. On main it refreshes the build cache so the next
      # release starts warm; on a pull request it only reads, because a fork's
      # token cannot write to the registry.
      - name: Build image
        if: steps.gate.outputs.build == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: false
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:buildcache
          cache-to: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') && format('type=registry,ref=ghcr.io/{0}/{1}:buildcache,mode=max', github.repository_owner, matrix.image) || '' }}

      - name: Build CLI prebuilt path
        if: steps.gate.outputs.build == 'true' && matrix.name == 'CLI'
        run: |
          set -euo pipefail
          mkdir -p prebuilt
          printf 'stub\n' > prebuilt/rom-weaver
          docker build --file Dockerfile --build-arg BINARY=prebuilt --tag prebuilt-smoke .

  # Exercise the webapp release COPY path against the real bundle built above.
  # The CLI equivalent rides in its already-gated source job, so it does not
  # start a separate runner after every Rust or webapp change.
  docker-prebuilt:
    name: Docker build (webapp, prebuilt)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: webapp-static
    if: github.ref_type != 'tag'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # `.dockerignore` drops `**/dist`, which is why both this and the release
      # fan-out stage the bundle under `prebuilt/` instead.
      - name: Download prebuilt bundle
        uses: actions/download-artifact@v8
        with:
          name: webapp-dist
          path: prebuilt

      - name: Build the prebuilt path
        run: |
          set -euo pipefail
          test -f prebuilt/index.html
          docker build --file packages/rom-weaver-webapp/Dockerfile \
            --build-arg DIST=prebuilt --tag prebuilt-smoke .

  # Built once and shared. This is the single most expensive step in the
  # pipeline (~6.5 min), and it used to run identically in two jobs.
  wasm:
    name: Build WASM module
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: changes
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        if: needs.changes.outputs.webapp == 'true'
        uses: actions/checkout@v7

      - name: Restore built wasm module
        if: needs.changes.outputs.webapp == 'true'
        id: wasm-cache
        uses: ./.github/actions/wasm-cache
        with:
          variant: prod
          path: |
            packages/rom-weaver-webapp/src/wasm/rom-weaver-app.wasm
            packages/rom-weaver-webapp/src/wasm/rom-weaver-app.wasm.br
            packages/rom-weaver-webapp/src/wasm/rom-weaver-app.wasm.prod.sha256
            packages/rom-weaver-webapp/src/wasm/NOTICE
            packages/rom-weaver-webapp/src/wasm/THIRD_PARTY_LICENSES.md
            packages/rom-weaver-webapp/src/wasm/third_party

      # Skipped entirely on a hit - the toolchain exists only to compile.
      - uses: ./.github/actions/setup-build-env
        if: needs.changes.outputs.webapp == 'true' && steps.wasm-cache.outputs.cache-hit != 'true'
        with:
          tools: node rust binaryen
          apt-packages: cmake ninja-build pkg-config clang libclang-dev
          rust-targets: wasm32-wasip1-threads
          wasi-sdk: "true"

      # Never set RUSTFLAGS here: Cargo replaces configured target flags instead
      # of extending them, silently dropping shared-memory, LTO, and exports.
      # The separate non-linking Rust check denies warnings.
      - name: Build production WASM
        if: needs.changes.outputs.webapp == 'true' && steps.wasm-cache.outputs.cache-hit != 'true'
        run: mise run build-wasm-prod

      # Validate completeness and the 4 GiB memory ceiling on both cache paths.
      # Use runner Node because toolchain setup is skipped on hits.
      - name: Verify wasm artifact
        if: needs.changes.outputs.webapp == 'true'
        run: node scripts/wasm/verify-wasm-artifact.mjs packages/rom-weaver-webapp/src/wasm

      # The wasm module and its brotli sibling are already compressed, so
      # re-compressing them into the artifact only burns time.
      - name: Upload WASM artifact
        if: needs.changes.outputs.webapp == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: wasm-prod
          if-no-files-found: error
          compression-level: 0
          path: |
            packages/rom-weaver-webapp/src/wasm/rom-weaver-app.wasm
            packages/rom-weaver-webapp/src/wasm/rom-weaver-app.wasm.br
            packages/rom-weaver-webapp/src/wasm/rom-weaver-app.wasm.prod.sha256
            packages/rom-weaver-webapp/src/wasm/NOTICE
            packages/rom-weaver-webapp/src/wasm/THIRD_PARTY_LICENSES.md
            packages/rom-weaver-webapp/src/wasm/third_party

  # Everything that needs a host-profile Rust build and nothing from wasm, so
  # it runs concurrently with the wasm build instead of queueing behind it.
  rust-host:
    name: "Rust (Linux: lint + tests)"
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: changes
    if: github.ref_type != 'tag' && needs.changes.outputs.rust == 'true'
    env:
      CARGO_TERM_COLOR: always
      # Full debuginfo is the bulk of a dev-profile target/, which is what this
      # job's rust-cache entry stores against the shared 10 GiB budget. Line
      # tables keep file:line in test backtraces while dropping the rest; the
      # Windows leg has run this way from the start (see its env for the
      # original reasoning). Applies to the test profile via dev-profile
      # inheritance; local builds are untouched.
      CARGO_PROFILE_DEV_DEBUG: line-tables-only
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # The whitespace check below diffs against the PR base.
          fetch-depth: 0

      - uses: ./.github/actions/setup-build-env
        with:
          tools: node rust ripgrep cargo-deny cargo-machete nextest
          apt-packages: cmake ninja-build pkg-config clang libclang-dev
          rust-components: clippy rustfmt

      - name: Rust format
        run: mise run fmt

      - name: Rust clippy
        run: mise run clippy

      - name: Rust typegen
        run: mise run typegen-check

      - name: Whitespace
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
          HEAD_SHA: ${{ github.sha }}
        # The task reads BASE_SHA/HEAD_SHA above; the lefthook hook runs the same
        # task with neither set and checks the staged diff instead.
        run: mise run whitespace

      - name: Thread guard regressions
        run: mise run thread-guards

      - name: Rust tests
        run: mise run test-rust

      - name: Third-party attribution bundle
        run: mise run licenses-check

      # Advisories moved to the non-gating `security` job; what stays here is
      # the half we author and can always fix in the same commit.
      - name: Rust dependency policy (licenses, sources)
        run: mise run deny-policy

      - name: Unused Rust dependencies
        run: mise run machete

      - name: Verify publishable Rust packages
        # Package each crate exactly as cargo publish would, without uploading.
        # Workspace tests already compile the local dependency graph. Skip cargo's
        # per-package verification here because it resolves same-version workspace
        # dependencies from crates.io, which may still contain the pre-change graph.
        run: cargo publish --workspace --locked --dry-run --no-verify

  # Build every native target the release publishes before a change reaches
  # release day. Linux musl targets use cross; Windows targets select the
  # matching MSVC environment explicitly.
  cli-platforms:
    name: CLI target (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    needs: changes
    if: github.ref_type != 'tag' && needs.changes.outputs.rust == 'true'
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: darwin-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            build: build
            binary: rom-weaver
          - package: darwin-x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            build: build
            binary: rom-weaver
          - package: linux-arm64-musl
            runner: ubuntu-24.04
            target: aarch64-unknown-linux-musl
            build: cross
            binary: rom-weaver
          - package: linux-ia32-musl
            runner: ubuntu-24.04
            target: i686-unknown-linux-musl
            build: cross
            binary: rom-weaver
          - package: linux-x64-gnu
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            build: build
            binary: rom-weaver
          - package: linux-x64-musl
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            build: cross
            binary: rom-weaver
          - package: win32-arm64-msvc
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            build: build
            binary: rom-weaver.exe
            msvc_arch: arm64
            msvc_host: arm64
          - package: win32-ia32-msvc
            runner: windows-2025
            target: i686-pc-windows-msvc
            build: build
            binary: rom-weaver.exe
            msvc_arch: x86
            msvc_host: amd64
          - package: win32-x64-msvc
            runner: windows-2025
            target: x86_64-pc-windows-msvc
            build: build
            binary: rom-weaver.exe
            msvc_arch: amd64
            msvc_host: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cli-platform-${{ matrix.package }}
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes cmake ninja-build pkg-config

      - uses: taiki-e/install-action@v2
        if: matrix.build == 'cross'
        with:
          tool: cross@0.2.5

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false

      - name: Build release CLI
        if: runner.os != 'Windows' && matrix.build != 'cross'
        run: cargo build --locked --release --package rom-weaver-cli --target ${{ matrix.target }}

      - name: Build release CLI
        if: matrix.build == 'cross'
        run: cross build --locked --release --package rom-weaver-cli --target ${{ matrix.target }}

      - name: Build release CLI
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          for /f "usebackq delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -property installationPath`) do set "VSINSTALL=%%i"
          call "%VSINSTALL%\Common7\Tools\VsDevCmd.bat" -arch=${{ matrix.msvc_arch }} -host_arch=${{ matrix.msvc_host }}
          cargo build --locked --release --package rom-weaver-cli --target ${{ matrix.target }}

      - name: Verify release CLI
        if: matrix.package != 'linux-arm64-musl'
        run: >-
          node scripts/verify-cli-platform.mjs
          target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Upload Linux arm64 CLI for native test
        if: matrix.package == 'linux-arm64-musl'
        uses: actions/upload-artifact@v7
        with:
          name: ci-cli-linux-arm64-musl
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}
          if-no-files-found: error

      - name: Verify platform package
        shell: bash
        run: |
          node scripts/prepare-npm-platform-package.mjs \
            "${{ matrix.package }}" \
            "target/${{ matrix.target }}/release/${{ matrix.binary }}"
          npm pack --dry-run --ignore-scripts --json \
            "packages/rom-weaver-cli-platforms/${{ matrix.package }}"

  cli-linux-arm64:
    name: CLI target runtime (aarch64-unknown-linux-musl)
    runs-on: ubuntu-24.04-arm
    needs: [changes, cli-platforms]
    if: github.ref_type != 'tag' && needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: ci-cli-linux-arm64-musl
          path: cli

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false

      - name: Verify release CLI
        run: |
          chmod +x cli/rom-weaver
          node scripts/verify-cli-platform.mjs cli/rom-weaver

  # Every scanner whose input is the outside world rather than this repository.
  # Deliberately not gating: an advisory is published against a transitive
  # dependency without any commit of ours, and letting that turn each open pull
  # request red blocks unrelated work until someone lands an upgrade. Findings
  # surface as annotations and a job summary instead, so this job stays green.
  security:
    name: Security advisories
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: changes
    if: github.ref_type != 'tag' && needs.changes.outputs.security == 'true'
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Both scanners resolve from lockfiles and compile nothing, so this job
      # needs Rust only as the host for `cargo deny`.
      - uses: ./.github/actions/setup-build-env
        with:
          tools: node rust cargo-deny
          cargo-cache: "false"

      - name: Rust advisories
        run: scripts/warn-only.sh "Rust advisories" mise run deny-advisories

      # `npm audit` resolves straight from the lockfiles, so this needs node but
      # no install, keeping the webapp's `npm ci` off this job entirely.
      - name: npm advisories
        run: |
          scripts/warn-only.sh "npm advisories (root)" npm run audit:deps
          scripts/warn-only.sh "npm advisories (webapp)" \
            npm --prefix packages/rom-weaver-webapp run audit:deps

  # No separate `wasm-check` job. It compiled a strict subset of the production
  # module above, while the source-exact cache already covers every input that
  # could break it. The broad local gate keeps the check available to developers.

  # The release fan-out builds the CLI for macOS, but until here nothing ever
  # *tested* on it - a platform-specific regression surfaced at publish time or
  # from a user report. fmt, clippy, typegen, and the policy checks are
  # platform-independent and already gate in `rust-host`.
  #
  # Uses the same mise/setup-build-env path as the Linux jobs: mise is the
  # toolchain manager the repo's macOS development already runs on. This leg
  # needs neither the WASI SDK nor the wasm target.
  rust-macos:
    name: Rust (macOS)
    runs-on: macos-14
    timeout-minutes: 90
    needs: changes
    if: github.ref_type != 'tag' && needs.changes.outputs.rust == 'true'
    env:
      CARGO_TERM_COLOR: always
      # Same trade as rust-host above: test backtraces keep file:line while
      # the cache entry and compile shed the bulk of the debuginfo.
      CARGO_PROFILE_DEV_DEBUG: line-tables-only
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # The runner image ships cmake and the Xcode clang, which covers the
      # vendored libarchive host build; no brew installs needed.
      - uses: ./.github/actions/setup-build-env
        with:
          tools: rust nextest

      - name: Rust tests
        run: mise run test-rust

  # Windows cannot reuse the mise path: the wasm toolchain's compiler shims
  # are bash scripts a native cargo cannot exec, and mise's [env] templates
  # assume a POSIX shell. The npm platform publish already proves the
  # dtolnay + rustup route on this exact image, so the tests ride that instead.
  # The toolchain pin is read from .mise.toml so this leg can never drift from
  # the version the other jobs test with. No wasm leg here - building the wasm
  # module on Windows is unsupported until those shims have a native
  # counterpart.
  rust-windows:
    name: Rust (Windows)
    runs-on: windows-2025
    timeout-minutes: 90
    needs: changes
    if: github.ref_type != 'tag' && needs.changes.outputs.rust == 'true'
    env:
      CARGO_TERM_COLOR: always
      # The mise legs get this from .mise.toml's [env]; this leg bypasses mise.
      # Incremental artifacts only bloat the rust-cache save.
      CARGO_INCREMENTAL: "0"
      # MSVC debug info (PDBs, link.exe /DEBUG) is the priciest part of a
      # Windows debug build. Line tables keep file:line in test backtraces
      # while skipping the bulk of it. Applies to the test profile via its
      # dev-profile inheritance; local builds are untouched.
      CARGO_PROFILE_DEV_DEBUG: line-tables-only
      # rust-lld (lld-link flavor, ships with the toolchain) links large test
      # binaries markedly faster than MSVC link.exe, and this workspace
      # produces many of them. Safe here (unlike the wasm job) because this
      # target has no configured link flags to clobber.
      RUSTFLAGS: -C linker=rust-lld
      # The workspace (and target/) already lives on D:, the runner's local
      # temp disk (~9-19k IOPS); C: is remote-backed managed storage (~4-6k
      # IOPS and often worse). Move the remaining hot paths off C:: the crate
      # registry + installed cargo binaries, the toolchain rustc/std read on
      # every compile, and the temp dirs the test suite churns through
      # (the step below points TMP/TEMP at RUNNER_TEMP, already on D:).
      # rustup, taiki-e/install-action, and rust-cache all honor these.
      CARGO_HOME: D:\cargo-home
      RUSTUP_HOME: D:\rustup-home
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # The default Windows temp dir lives on the slow OS disk; the test
      # suite churns through temp fixtures, so point it at RUNNER_TEMP on the
      # local disk instead. A step because the `runner` context is not
      # available in job-level env.
      - name: Move temp dirs off the OS disk
        shell: bash
        run: |
          {
            echo "TMP=$RUNNER_TEMP"
            echo "TEMP=$RUNNER_TEMP"
          } >> "$GITHUB_ENV"

      - name: Read pinned Rust version
        id: pin
        shell: bash
        run: |
          version=$(sed -n 's/^rust = "\(.*\)"$/\1/p' .mise.toml)
          if [ -z "$version" ]; then
            echo "::error::no rust pin found in .mise.toml"
            exit 1
          fi
          echo "rust=$version" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.pin.outputs.rust }}

      # Same restore-everywhere/save-on-main policy as the Linux jobs; the key
      # includes the OS, so this leg never collides with the others.
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # Same version as the .mise.toml pin; this leg cannot use mise.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9.140

      # The runner image ships cmake and MSVC + LLVM, which is everything the
      # vendored libarchive build needs - the npm platform publish builds this
      # same graph with no extra installs. nextest does not execute doctests,
      # so those run as a separate cargo test --doc pass, same as the
      # test-rust mise task.
      - name: Rust tests
        run: cargo nextest run --workspace --locked

      - name: Rust doc tests
        run: cargo test --quiet --doc --workspace --locked

  # Presents one stable check name while the independent host and threaded-target
  # work runs in parallel, so branch protection has a single thing to require.
  # The `main protection` ruleset requires this context by name. It must fail
  # rather than skip when a dependency fails, hence `!cancelled()` plus the
  # explicit result assertions below - a skipped check counts as passing.
  # `!cancelled()` rather than `always()`: when the run itself is cancelled
  # (superseded by a newer push, or by hand) the dependencies report
  # `cancelled`, and `always()` would turn that into a red Rust check on a
  # build nobody finished.
  rust:
    name: Rust
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [changes, rust-host, cli-platforms, cli-linux-arm64, rust-macos, rust-windows]
    if: ${{ !cancelled() && github.ref_type != 'tag' }}
    steps:
      - name: Verify Rust jobs
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          RUST_SELECTED: ${{ needs.changes.outputs.rust }}
          HOST_RESULT: ${{ needs.rust-host.result }}
          CLI_PLATFORMS_RESULT: ${{ needs.cli-platforms.result }}
          CLI_LINUX_ARM64_RESULT: ${{ needs.cli-linux-arm64.result }}
          MACOS_RESULT: ${{ needs.rust-macos.result }}
          WINDOWS_RESULT: ${{ needs.rust-windows.result }}
        run: |
          [[ "$CHANGES_RESULT" == success ]]
          check() { [[ "$1" == success || ( "$1" == skipped && "$2" != true ) ]]; }
          check "$HOST_RESULT" "$RUST_SELECTED"
          check "$CLI_PLATFORMS_RESULT" "$RUST_SELECTED"
          check "$CLI_LINUX_ARM64_RESULT" "$RUST_SELECTED"
          check "$MACOS_RESULT" "$RUST_SELECTED"
          check "$WINDOWS_RESULT" "$RUST_SELECTED"

  # The webapp work consumes the prebuilt wasm module and compiles no Rust of
  # its own. It is split into four jobs so the slow parallel browser suite is
  # never serialized behind lint or the other suites, and the node-only work
  # skips the Playwright install entirely; the `webapp` aggregate below gives
  # branch protection one stable name for all of it.
  webapp-static:
    name: Webapp (static)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: [changes, wasm]
    if: github.ref_type != 'tag' && needs.changes.outputs.webapp == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: ./.github/actions/setup-build-env
        with:
          tools: node ripgrep
          cargo-cache: "false"
          webapp-deps: "true"

      - name: Download WASM artifact
        uses: actions/download-artifact@v8
        with:
          name: wasm-prod
          path: packages/rom-weaver-webapp/src/wasm

      # Lives here rather than in the `rust` job because
      # scripts/wasm/rom-weaver-runtime-utils.test.mjs asserts the built module
      # imports only env functions the runtime provides - it reads the real
      # .wasm and needs the artifact downloaded above.
      - name: Build script tests
        run: npm test

      - name: Lint
        run: npm --prefix packages/rom-weaver-webapp run lint

      - name: Unit tests
        run: npm --prefix packages/rom-weaver-webapp run test:unit

      - name: Build
        run: npm --prefix packages/rom-weaver-webapp run build

      # Consumed by `docker-prebuilt`, so the image's release path is smoked
      # against a real bundle. Deliberately the same name, path and options as
      # the release fan-out's upload (release.yml) - the point is for CI to
      # exercise the artifact the publish job will hand the image, so any
      # divergence here defeats it. `include-hidden-files` included: see the
      # reasoning there.
      - name: Upload webapp bundle
        uses: actions/upload-artifact@v7
        with:
          name: webapp-dist
          path: packages/rom-weaver-webapp/dist
          if-no-files-found: error
          include-hidden-files: true

  # The single longest webapp suite (~4 min) rides alone so it defines this
  # group's wall clock instead of adding to it.
  webapp-browser:
    name: Webapp (browser)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: [changes, wasm]
    if: github.ref_type != 'tag' && needs.changes.outputs.webapp == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: ./.github/actions/setup-build-env
        with:
          tools: node ripgrep
          cargo-cache: "false"
          webapp-deps: "true"

      - name: Download WASM artifact
        uses: actions/download-artifact@v8
        with:
          name: wasm-prod
          path: packages/rom-weaver-webapp/src/wasm

      - name: Browser tests (parallel)
        env:
          # ubuntu-24.04 already ships Chrome, so this job does not need to
          # download Playwright's Chromium or install its system dependencies.
          ROM_WEAVER_SYSTEM_CHROME: "1"
        run: npm --prefix packages/rom-weaver-webapp run test:browser:parallel

  # Everything else that needs Playwright chromium: the wasm-layer browser
  # suite, the Chromium E2E pass, and the icon check.
  webapp-wasm-e2e:
    name: Webapp (WASM + E2E)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: [changes, wasm]
    if: github.ref_type != 'tag' && needs.changes.outputs.webapp == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: ./.github/actions/setup-build-env
        with:
          tools: node ripgrep
          cargo-cache: "false"
          webapp-deps: "true"
          playwright: "true"

      - name: Download WASM artifact
        uses: actions/download-artifact@v8
        with:
          name: wasm-prod
          path: packages/rom-weaver-webapp/src/wasm

      # The per-channel app icons are committed, not built, so nothing else would
      # notice them going stale against logo.svg / the icon masters / an accent's
      # colours. Re-renders them in memory and diffs. Needs the playwright
      # chromium this job already installs.
      - name: Channel icons up to date
        run: npm --prefix packages/rom-weaver-webapp run icons:channels:check

      - name: Browser tests (wasm)
        run: npm --prefix packages/rom-weaver-webapp run test:browser:wasm

      - name: Webapp E2E
        run: npm --prefix packages/rom-weaver-webapp run test:e2e:webapp

  webapp-webkit-e2e:
    name: Webapp (WebKit E2E)
    # The full WASM path requires WebKit OPFS. Playwright's Linux WebKit exposes
    # the API surface but hangs when the first real OPFS-backed operation starts;
    # macOS WebKit exercises the supported Safari-family implementation.
    runs-on: macos-14
    timeout-minutes: 60
    needs: [changes, wasm]
    if: github.ref_type != 'tag' && needs.changes.outputs.webapp == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: ./.github/actions/setup-build-env
        with:
          tools: node
          cargo-cache: "false"
          webapp-deps: "true"
          playwright: "true"
          playwright-browsers: webkit

      - name: Download WASM artifact
        uses: actions/download-artifact@v8
        with:
          name: wasm-prod
          path: packages/rom-weaver-webapp/src/wasm

      - name: Webapp E2E (WebKit)
        run: npm --prefix packages/rom-weaver-webapp run test:e2e:webapp:webkit

  # Same shape as the `rust` aggregate above: one stable check name (`Webapp`)
  # for branch protection while the four webapp jobs run in parallel. Must
  # fail rather than skip when a dependency fails (a skipped check counts as
  # passing), and `!cancelled()` keeps a superseded run from reporting red.
  webapp:
    name: Webapp
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [changes, webapp-static, webapp-browser, webapp-wasm-e2e, webapp-webkit-e2e]
    if: ${{ !cancelled() && github.ref_type != 'tag' }}
    steps:
      - name: Verify webapp jobs
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          WEBAPP_SELECTED: ${{ needs.changes.outputs.webapp }}
          STATIC_RESULT: ${{ needs.webapp-static.result }}
          BROWSER_RESULT: ${{ needs.webapp-browser.result }}
          WASM_E2E_RESULT: ${{ needs.webapp-wasm-e2e.result }}
          WEBKIT_E2E_RESULT: ${{ needs.webapp-webkit-e2e.result }}
        run: |
          [[ "$CHANGES_RESULT" == success ]]
          check() { [[ "$1" == success || ( "$1" == skipped && "$2" != true ) ]]; }
          check "$STATIC_RESULT" "$WEBAPP_SELECTED"
          check "$BROWSER_RESULT" "$WEBAPP_SELECTED"
          check "$WASM_E2E_RESULT" "$WEBAPP_SELECTED"
          check "$WEBKIT_E2E_RESULT" "$WEBAPP_SELECTED"

  # Decide which channels this ref publishes to. Channels are ordered
  # prod -> beta -> nightly, and a deploy refreshes its own channel plus every
  # less-stable one below it, so beta and nightly can never sit on code older
  # than production:
  #
  #   vX.Y.Z tag          -> prod, beta, nightly
  #   vX.Y.Z-alpha.N tag  -> beta, nightly
  #   push to main        -> nightly
  #   pull request        -> preview
  #
  # Split out of `deploy` because the channel list drives that job's matrix, and
  # a matrix can only be fed by an upstream job's output.
  deploy-plan:
    name: Webapp deploy (plan)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: changes
    # Same non-gating boundary as `deploy` below: a failure here must skip
    # deployment, not fail the build that release automation waits on.
    continue-on-error: true
    # Secrets are withheld from fork and Dependabot pull requests, so those
    # previews could only ever fail. Skip them instead of creating red checks.
    # A manual run deploys nothing unless a channel is picked explicitly.
    if: >-
      (github.ref_type == 'tag' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_channel != 'none') ||
      needs.changes.outputs.webapp == 'true') &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.deploy_channel != 'none') &&
      (github.event_name != 'pull_request' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login != 'dependabot[bot]'))
    outputs:
      targets: ${{ steps.plan.outputs.targets }}
    steps:
      # A tag containing a hyphen after the version is a prerelease
      # (v1.2.3-alpha.1) and enters the ladder at beta; a bare vX.Y.Z enters at
      # prod. A manual run deploys exactly the channel asked for - it is a
      # break-glass override, so it does not cascade.
      - name: Resolve channels
        id: plan
        env:
          MANUAL: ${{ github.event.inputs.deploy_channel }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          if [ -n "$MANUAL" ] && [ "$MANUAL" != "none" ]; then
            channels="$MANUAL"
          elif [ "$EVENT_NAME" = "pull_request" ]; then
            channels="preview"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            case "${GITHUB_REF_NAME}" in
              *-*) channels="beta nightly" ;;
              *)   channels="prod beta nightly" ;;
            esac
          else
            channels="nightly"
          fi
          targets=""
          for channel in $channels; do
            # `branch` is what makes a deployment production vs preview: wrangler
            # treats the project's production branch (main) as a live deploy and
            # anything else as a throwaway preview.
            branch=main
            # `label` is what the bundle shows in its masthead badge and PWA name.
            label="$channel"
            case "$channel" in
              prod)    project=rom-weaver ;;
              beta)    project=rom-weaver-beta ;;
              nightly) project=rom-weaver-nightly ;;
              preview)
                project=rom-weaver-preview
                branch="pr-${PR_NUMBER}"
                label="pr-${PR_NUMBER}"
                ;;
              *) echo "::error::unknown channel '$channel'"; exit 1 ;;
            esac
            targets="$targets$(jq -cn \
              --arg channel "$channel" \
              --arg branch "$branch" \
              --arg label "$label" \
              --arg project "$project" \
              '{$channel, $branch, $label, $project}')"$'\n'
          done
          matrix=$(printf '%s' "$targets" | jq -cs .)
          echo "targets=$matrix" >> "$GITHUB_OUTPUT"
          echo "Deploying ref ${GITHUB_REF_NAME} to: $channels"

  # Build and publish one channel per matrix leg, to isolated Cloudflare origins
  # (rom-weaver.com, beta.rom-weaver.com, nightly.rom-weaver.com, and disposable
  # per-PR previews). `deploy-plan` above decides which legs exist.
  #
  # Direct Upload reuses the CI-tested WASM artifact without Cloudflare build
  # minutes or a second toolchain. Depend only on `wasm` so preview URLs arrive
  # while the rest of the suite is still running.
  deploy:
    name: Webapp deploy (${{ matrix.target.channel }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: [wasm, deploy-plan]
    # Deployment was a separate, non-gating workflow before it moved here to
    # share the wasm artifact. Preserve that boundary: a Cloudflare outage must
    # not turn a green main build red and suppress release automation.
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
      statuses: write
    # An empty or missing list would be a hard "matrix contains no values"
    # error, so guard rather than trusting the planner to always emit one.
    if: needs.deploy-plan.outputs.targets != '' && needs.deploy-plan.outputs.targets != '[]'
    strategy:
      # Separate Pages projects with no shared state, so they upload in
      # parallel; a release's three channels land in the time of one. The
      # channel is baked into the bundle, so each needs its own build - there is
      # no artifact to share between them.
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.deploy-plan.outputs.targets) }}
    steps:
      - uses: actions/checkout@v7
        with:
          # The deployed changelog is generated from the latest 50 commits.
          fetch-depth: 0

      # This job compiles nothing - it runs vite and wrangler over a prebuilt
      # module - so the Rust toolchain is dead weight here.
      - uses: ./.github/actions/setup-build-env
        with:
          tools: node ripgrep
          cargo-cache: "false"
          webapp-deps: "true"

      - name: Download WASM artifact
        uses: actions/download-artifact@v8
        with:
          name: wasm-prod
          path: packages/rom-weaver-webapp/src/wasm

      # The channel stamps the bundle's visible identity - masthead badge, tab
      # title, PWA name and accent tokens - so a nightly or preview tab is never
      # mistaken for production. Unset (any local build) resolves to "dev".
      - name: Build webapp
        env:
          ROM_WEAVER_CHANNEL: ${{ matrix.target.channel }}
          ROM_WEAVER_CHANNEL_LABEL: ${{ matrix.target.label }}
        run: npm --prefix packages/rom-weaver-webapp run build

      # Idempotent, so the first run on a channel bootstraps its own project and
      # no local wrangler auth is ever needed.
      #
      # Uses the REST API rather than `wrangler pages project create`: wrangler
      # enumerates accounts internally, which a token scoped to specific account
      # resources cannot do, and it surfaces that as a bare "unknown error
      # [code: 8000000]" against an endpoint that works fine directly.
      - name: Ensure Cloudflare Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT: ${{ matrix.target.project }}
        run: |
          set -o pipefail
          api="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects"
          body=$(curl -sS -X POST "$api" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"name\":\"${PROJECT}\",\"production_branch\":\"main\"}")
          if [ "$(printf '%s' "$body" | jq -r '.success')" = "true" ]; then
            echo "created Pages project '$PROJECT'"
          elif printf '%s' "$body" | jq -e '.errors[]? | select(.code == 8000002 or (.message | test("already exists"; "i")))' >/dev/null; then
            echo "Pages project '$PROJECT' already exists"
          else
            echo "unexpected response creating '$PROJECT':" >&2
            printf '%s\n' "$body" | jq . >&2 || printf '%s\n' "$body" >&2
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT: ${{ matrix.target.project }}
          BRANCH: ${{ matrix.target.branch }}
        run: |
          set -o pipefail
          npx --yes wrangler@4 pages deploy packages/rom-weaver-webapp/dist \
            --project-name="$PROJECT" \
            --branch="$BRANCH" \
            --commit-hash="${GITHUB_SHA}" 2>&1 | tee /tmp/deploy.log
          url=$(grep -oE 'https://[a-z0-9.-]+\.pages\.dev' /tmp/deploy.log | tail -1)
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "deployed to $url"

      # Keep the status for the checks list, and keep one discoverable comment
      # on the PR for people who do not open the checks list.
      - name: Publish preview URL
        if: matrix.target.channel == 'preview' && steps.deploy.outputs.url != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ALIAS: https://${{ matrix.target.branch }}.rom-weaver-preview.pages.dev
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          gh api "repos/${GITHUB_REPOSITORY}/statuses/${HEAD_SHA}" \
            --method POST \
            --field state=success \
            --field context='preview/webapp' \
            --field target_url="${ALIAS}" \
            --field description='Preview deployment - click Details' \
            --silent

          body=$(cat <<EOF
          <!-- rom-weaver-preview -->
          Preview: [Open the deployed webapp](${ALIAS})

          Updated for commit ${HEAD_SHA:0:7}.
          EOF
          )
          comment_id=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq '.[] | select(.body | contains("<!-- rom-weaver-preview -->")) | .id' \
            | sed -n '1p')
          if [ -n "$comment_id" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" \
              --method PATCH \
              --field body="$body" \
              --silent
            echo "updated preview comment #${comment_id}"
          else
            gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --method POST \
              --field body="$body" \
              --silent
            echo "created preview comment"
          fi
          echo "preview status -> ${ALIAS}"
