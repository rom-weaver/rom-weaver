name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      CARGO_TERM_COLOR: always
      WASI_SDK_VERSION: "33"
      WASI_SDK_SHA256: 0ba8b5bfaeb2adf3f29bab5841d76cf5318ab8e1642ea195f88baba1abd47bce
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install system dependencies
        # brotli has no pinnable mise binary; cmake/ninja/pkg-config build the
        # vendored C deps. node, wasm-opt, and ripgrep come from mise; the WASI SDK
        # is downloaded below (pinning it via mise would shadow clang on PATH and
        # break the libarchive-sys bindgen).
        run: |
          sudo apt-get update
          sudo apt-get install --yes brotli cmake ninja-build pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-wasip1-threads

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install mise (node, wasm-opt, ripgrep)
        uses: jdx/mise-action@v4
        with:
          install: true

      - name: Install WASI SDK
        run: |
          curl --fail --location --show-error \
            --output "$RUNNER_TEMP/wasi-sdk.tar.gz" \
            "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux.tar.gz"
          echo "${WASI_SDK_SHA256}  $RUNNER_TEMP/wasi-sdk.tar.gz" | sha256sum --check
          tar --extract --gzip --file "$RUNNER_TEMP/wasi-sdk.tar.gz" --directory "$RUNNER_TEMP"
          echo "WASI_SDK_PATH=$RUNNER_TEMP/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux" >> "$GITHUB_ENV"

      # Node comes from mise (.mise.toml [tools] node); cache npm downloads
      # since we no longer use setup-node's built-in cache.
      - name: Cache npm downloads
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json', 'packages/rom-weaver-webapp/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install package dependencies
        run: npm ci --prefix packages/rom-weaver-webapp

      - name: Install browser test dependencies
        run: npm --prefix packages/rom-weaver-webapp exec playwright install --with-deps chromium

      - name: Rust format
        run: mise run fmt

      - name: Rust clippy
        run: mise run clippy

      - name: Rust typegen
        run: mise run typegen-check

      - name: WASM threaded check
        run: RUSTFLAGS="${RUSTFLAGS:-} -D warnings" mise run wasm-check

      - name: Whitespace
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [[ -n "$BASE_SHA" && "$BASE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            git diff --check "$BASE_SHA" "$HEAD_SHA"
          else
            git diff-tree --check --no-commit-id --exit-code -r "$HEAD_SHA"
          fi

      - name: Thread guard regressions
        run: mise run thread-guards

      - name: Rust tests
        run: mise run test-rust

      - name: Third-party attribution bundle
        run: mise run licenses-check

      - name: Rust supply chain (advisories, licenses, sources)
        run: mise run deny

      - name: Unused Rust dependencies
        run: mise run machete

      - name: npm advisories
        run: |
          npm run audit:deps
          npm --prefix packages/rom-weaver-webapp run audit:deps

      - name: WASM build
        run: mise run build-wasm-prod

      - name: rom-weaver-webapp checks
        run: |
          npm test
          npm --prefix packages/rom-weaver-webapp run lint
          npm --prefix packages/rom-weaver-webapp run test:unit
          npm --prefix packages/rom-weaver-webapp run test:browser:wasm
          npm --prefix packages/rom-weaver-webapp run test:browser:parallel
          npm --prefix packages/rom-weaver-webapp run test:e2e:webapp
          npm --prefix packages/rom-weaver-webapp run build

  # Coverage runs independently from `quality` and has no percentage threshold,
  # but every contributing suite must pass and produce LCOV before the aggregate
  # line-coverage number is published.
  coverage:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      CARGO_TERM_COLOR: always
      WASI_SDK_VERSION: "33"
      WASI_SDK_SHA256: 0ba8b5bfaeb2adf3f29bab5841d76cf5318ab8e1642ea195f88baba1abd47bce
      ROM_WEAVER_COVERAGE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes brotli cmake ninja-build pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview
          targets: wasm32-wasip1-threads

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install mise (node, wasm-opt, ripgrep)
        uses: jdx/mise-action@v4
        with:
          install: true

      - name: Install WASI SDK
        run: |
          curl --fail --location --show-error \
            --output "$RUNNER_TEMP/wasi-sdk.tar.gz" \
            "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux.tar.gz"
          echo "${WASI_SDK_SHA256}  $RUNNER_TEMP/wasi-sdk.tar.gz" | sha256sum --check
          tar --extract --gzip --file "$RUNNER_TEMP/wasi-sdk.tar.gz" --directory "$RUNNER_TEMP"
          echo "WASI_SDK_PATH=$RUNNER_TEMP/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux" >> "$GITHUB_ENV"

      - name: Cache npm downloads
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json', 'packages/rom-weaver-webapp/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install package dependencies
        run: npm ci --prefix packages/rom-weaver-webapp

      - name: Install browser test dependencies
        run: npm --prefix packages/rom-weaver-webapp exec playwright install --with-deps chromium

      - name: Rust coverage
        run: mise run coverage-rust

      - name: WASM build
        run: mise run build-wasm-prod

      - name: React unit coverage
        run: npm --prefix packages/rom-weaver-webapp run test:unit:coverage

      - name: React UI coverage
        run: npm --prefix packages/rom-weaver-webapp run test:browser:coverage

      - name: React wasm coverage
        run: npm --prefix packages/rom-weaver-webapp run test:browser:wasm:coverage

      - name: Coverage summary
        run: node scripts/coverage-summary.mjs

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: dist/coverage/**
          if-no-files-found: warn
