name: Set up build environment
description: >-
  Shared toolchain setup for the CI jobs: apt packages, mise-pinned tools,
  Rust components/targets, cargo cache, WASI SDK, webapp node_modules, and
  Playwright browsers. Every piece is opt-in so a job installs only what it
  actually runs - the whole point of splitting CI into narrow jobs.

inputs:
  tools:
    description: >-
      Space-separated short names of the .mise.toml tools this job needs
      (node, rust, binaryen, ripgrep, cargo-deny, cargo-machete,
      cargo-semver-checks, actionlint, shellcheck, hadolint). Everything else
      is disabled. An unknown name fails the job. Empty installs every pinned
      tool.
    default: ""
  apt-packages:
    description: Space-separated apt packages to install (empty skips apt entirely).
    default: ""
  rust-components:
    description: Space-separated rustup components to add to the mise-pinned toolchain.
    default: ""
  rust-targets:
    description: Space-separated rustup targets to add to the mise-pinned toolchain.
    default: ""
  cargo-cache:
    description: Restore/save the cargo build cache. Set to false for jobs that never compile Rust.
    default: "true"
  cache-save:
    description: Save restored caches. Set to false for workflow_run jobs, which are restore-only.
    default: "true"
  wasi-sdk:
    description: Download (or restore from cache) the WASI SDK and export WASI_SDK_PATH.
    default: "false"
  wasi-sdk-version:
    description: WASI SDK major version. Single source of truth for every job.
    default: "33"
  wasi-sdk-sha256:
    description: Checksum of the x86_64-linux WASI SDK tarball. Part of the cache key, so a version bump can never serve a stale SDK.
    default: 0ba8b5bfaeb2adf3f29bab5841d76cf5318ab8e1642ea195f88baba1abd47bce
  wasi-sdk-sha256-macos:
    description: Checksum of the arm64-macos WASI SDK tarball, for the macOS platform leg.
    default: 85c997a2665ead91673b5bb88b7d0df3fc8900df3bfa244f720d478187bbdc78
  webapp-deps:
    description: Run `npm ci` for the webapp package.
    default: "false"
  playwright:
    description: Install Playwright browsers and their system dependencies.
    default: "false"
  playwright-browsers:
    description: Space-separated Playwright browsers to install. Only the nightly matrix needs WebKit.
    default: chromium

runs:
  using: composite
  steps:
    # clang/libclang-dev back the libarchive bindgen step in rom-weaver-containers; without them
    # it cannot resolve system headers ("'sys/stat.h' file not found").
    # cmake/ninja/pkg-config build the vendored C deps. Jobs that compile no
    # Rust pass an empty list.
    - name: Install system dependencies
      if: inputs.apt-packages != ''
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install --yes ${{ inputs.apt-packages }}
        lc="$(find /usr/lib /usr/lib64 -name 'libclang.so*' 2>/dev/null | head -n1)"
        [ -n "$lc" ] && echo "LIBCLANG_PATH=$(dirname "$lc")" >> "$GITHUB_ENV" || true

    # Written to GITHUB_ENV rather than passed to mise-action, so every later
    # `mise run` step in the job sees the same restriction the install did.
    - name: Select mise tools
      if: inputs.tools != ''
      shell: bash
      env:
        WANTED: ${{ inputs.tools }}
      run: |
        # shellcheck disable=SC2086 # deliberate word-splitting of the input list
        disable=$(scripts/ci/mise-disable-tools.sh .mise.toml $WANTED)
        echo "MISE_DISABLE_TOOLS=$disable" >> "$GITHUB_ENV"
        echo "installing: $WANTED"
        echo "disabled:   ${disable:-(none)}"

    - name: Install mise-pinned tools
      uses: jdx/mise-action@v4
      with:
        install: true

    # mise pins the toolchain (.mise.toml [tools] rust) and exports
    # RUSTUP_TOOLCHAIN, so components must be added to *that* toolchain rather
    # than to whatever rustup defaults to - `mise exec` supplies the pin.
    - name: Install Rust components
      if: inputs.rust-components != ''
      shell: bash
      run: mise exec -- rustup component add ${{ inputs.rust-components }}

    - name: Install Rust targets
      if: inputs.rust-targets != ''
      shell: bash
      run: mise exec -- rustup target add ${{ inputs.rust-targets }}

    # sccache is deliberately absent: .mise.toml resolves RUSTC_WRAPPER to
    # whatever is on PATH and leaves it empty otherwise, and nothing here
    # persists ~/.cache/sccache between runs. Installing it would reintroduce
    # the wrapper overhead for a cache that starts empty every time;
    # Swatinem/rust-cache does the caching that actually survives. The cache is
    # keyed per job, so the wasm job's wasm-release artifacts and the rust
    # job's host-profile artifacts no longer evict each other.
    - name: Cache cargo artifacts
      if: inputs.cargo-cache == 'true'
      uses: Swatinem/rust-cache@v2
      with:
        # Default is false, so a failing job saves nothing - a red pipeline
        # then rebuilds from cold every run, which is exactly when the cache
        # is worth most. The key already covers rustc + Cargo.lock, so a
        # cache written by a failed run is still valid for the next one.
        cache-on-failure: true
        # Restore everywhere, save only on main. A branch run writes ~450 MB
        # per Rust job into a branch-local scope that nothing else can ever
        # read, and once the branch is gone it is pure ballast against the
        # repository's 10 GiB budget - six closed dependabot PRs had 5.1 GB
        # parked this way, evicting the main-branch caches that cold runs
        # depend on. Branch runs give up nothing in practice: rust-cache has
        # never reported better than `full match: false` here, so they were
        # already restoring main's cache and rebuilding the delta.
        save-if: ${{ github.ref == 'refs/heads/main' && inputs.cache-save == 'true' }}

    # The SDK ships one archive per host platform; resolve which one this
    # runner needs, and its checksum, once for the three steps below.
    - name: Resolve WASI SDK platform
      if: inputs.wasi-sdk == 'true'
      id: wasi-sdk-platform
      shell: bash
      env:
        SHA256_LINUX: ${{ inputs.wasi-sdk-sha256 }}
        SHA256_MACOS: ${{ inputs.wasi-sdk-sha256-macos }}
      run: |
        case "$RUNNER_OS" in
          Linux) slug=x86_64-linux; sha256="$SHA256_LINUX" ;;
          macOS) slug=arm64-macos;  sha256="$SHA256_MACOS" ;;
          *) echo "::error::no WASI SDK wiring for $RUNNER_OS"; exit 1 ;;
        esac
        {
          echo "slug=$slug"
          echo "sha256=$sha256"
        } >> "$GITHUB_OUTPUT"

    # Keyed on the pinned version + its checksum, so a version bump misses the
    # cache by construction and never serves a stale SDK.
    - name: Restore WASI SDK cache
      if: inputs.wasi-sdk == 'true'
      id: wasi-sdk-cache
      uses: actions/cache/restore@v6
      with:
        path: ${{ runner.temp }}/wasi-sdk-${{ inputs.wasi-sdk-version }}.0-${{ steps.wasi-sdk-platform.outputs.slug }}
        key: wasi-sdk-${{ runner.os }}-${{ inputs.wasi-sdk-version }}-${{ steps.wasi-sdk-platform.outputs.sha256 }}

    - name: Install WASI SDK
      if: inputs.wasi-sdk == 'true' && steps.wasi-sdk-cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        WASI_SDK_VERSION: ${{ inputs.wasi-sdk-version }}
        WASI_SDK_SLUG: ${{ steps.wasi-sdk-platform.outputs.slug }}
        WASI_SDK_SHA256: ${{ steps.wasi-sdk-platform.outputs.sha256 }}
      run: |
        curl --fail --location --show-error \
          --output "$RUNNER_TEMP/wasi-sdk.tar.gz" \
          "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_VERSION}.0-${WASI_SDK_SLUG}.tar.gz"
        # shasum rather than sha256sum: present on both the Ubuntu and macOS images.
        echo "${WASI_SDK_SHA256}  $RUNNER_TEMP/wasi-sdk.tar.gz" | shasum -a 256 --check
        tar --extract --gzip --file "$RUNNER_TEMP/wasi-sdk.tar.gz" --directory "$RUNNER_TEMP"

    - name: Save WASI SDK cache
      if: inputs.wasi-sdk == 'true' && inputs.cache-save == 'true' && steps.wasi-sdk-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v6
      with:
        path: ${{ runner.temp }}/wasi-sdk-${{ inputs.wasi-sdk-version }}.0-${{ steps.wasi-sdk-platform.outputs.slug }}
        key: wasi-sdk-${{ runner.os }}-${{ inputs.wasi-sdk-version }}-${{ steps.wasi-sdk-platform.outputs.sha256 }}

    # Runs on both paths - a cache hit restores the tree but sets no env.
    - name: Export WASI SDK path
      if: inputs.wasi-sdk == 'true'
      shell: bash
      env:
        WASI_SDK_VERSION: ${{ inputs.wasi-sdk-version }}
        WASI_SDK_SLUG: ${{ steps.wasi-sdk-platform.outputs.slug }}
      run: echo "WASI_SDK_PATH=$RUNNER_TEMP/wasi-sdk-${WASI_SDK_VERSION}.0-${WASI_SDK_SLUG}" >> "$GITHUB_ENV"

    # Two exact pins, resolved once and used as cache keys below. node comes
    # from mise (.mise.toml [tools] node) and decides what `npm ci` produces;
    # playwright is pinned without a range in the webapp manifest and decides
    # which browser builds `playwright install` would fetch.
    - name: Resolve pinned tool versions
      if: inputs.webapp-deps == 'true' || inputs.playwright == 'true'
      id: versions
      shell: bash
      env:
        BROWSERS: ${{ inputs.playwright-browsers }}
      run: |
        {
          echo "node=$(node --version)"
          echo "playwright=$(jq -r '.devDependencies.playwright' packages/rom-weaver-webapp/package.json)"
          # The nightly matrix passes a space-separated list; GitHub expressions
          # have no string replace, so the key slug is built here instead.
          echo "browsers=$(tr ' ' '-' <<< "$BROWSERS")"
        } >> "$GITHUB_OUTPUT"

    # Cache the installed tree, not ~/.npm. The download cache only ever saved
    # the fetch half - `npm ci` still wiped and repopulated node_modules on
    # every run - while costing ~242 MB per lockfile revision, which made it
    # the second-largest consumer of the 10 GiB budget after the Rust caches.
    # The key covers exactly what determines the tree, so a hit means the
    # install can be skipped outright rather than merely sped up.
    #
    # The webapp lives in an npm workspace (packages/), so npm hoists shared deps
    # to packages/node_modules and keeps platform/unhoistable ones in each
    # package's own node_modules - all three trees are cached and keyed on the
    # single workspace lock. On a hit the wasm package's `dist/` is still absent
    # (it is outside node_modules and built per-job once the wasm binary lands),
    # so jobs bundle @rom-weaver/wasm after downloading the module.
    - name: Restore workspace node_modules cache
      if: inputs.webapp-deps == 'true'
      id: node-modules-cache
      uses: actions/cache/restore@v6
      with:
        path: |
          packages/node_modules
          packages/rom-weaver-wasm/node_modules
          packages/rom-weaver-webapp/node_modules
        key: node-modules-${{ runner.os }}-${{ steps.versions.outputs.node }}-${{ hashFiles('packages/package-lock.json') }}

    - name: Install package dependencies
      if: inputs.webapp-deps == 'true' && steps.node-modules-cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm ci --prefix packages

    - name: Save workspace node_modules cache
      if: inputs.webapp-deps == 'true' && inputs.cache-save == 'true' && steps.node-modules-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v6
      with:
        path: |
          packages/node_modules
          packages/rom-weaver-wasm/node_modules
          packages/rom-weaver-webapp/node_modules
        key: node-modules-${{ runner.os }}-${{ steps.versions.outputs.node }}-${{ hashFiles('packages/package-lock.json') }}

    # Browser binaries were the one download in this action that nothing
    # cached: every webapp, coverage, and nightly run re-fetched them. The
    # browser list is part of the key because the nightly matrix adds WebKit.
    - name: Restore Playwright browser cache
      if: inputs.playwright == 'true'
      id: playwright-cache
      uses: actions/cache/restore@v6
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ steps.versions.outputs.playwright }}-${{ steps.versions.outputs.browsers }}

    # The binaries restore from the cache; the apt-level libraries they link
    # against live outside it, so a hit still has to run `install-deps`.
    - name: Install browser test dependencies
      if: inputs.playwright == 'true'
      shell: bash
      env:
        BROWSERS: ${{ inputs.playwright-browsers }}
        CACHED: ${{ steps.playwright-cache.outputs.cache-hit }}
      run: |
        read -ra browsers <<< "$BROWSERS"
        if [ "$CACHED" = "true" ]; then
          npm --prefix packages/rom-weaver-webapp exec playwright install-deps "${browsers[@]}"
        else
          npm --prefix packages/rom-weaver-webapp exec -- playwright install --with-deps "${browsers[@]}"
        fi

    - name: Save Playwright browser cache
      if: inputs.playwright == 'true' && inputs.cache-save == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v6
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ steps.versions.outputs.playwright }}-${{ steps.versions.outputs.browsers }}
