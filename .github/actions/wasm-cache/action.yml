name: Restore built WASM module
description: >-
  Compute a source-exact cache key for a built WASM module and restore it.
  Building the module is the single most expensive step in the pipeline
  (~6.5 min). CI and weekly coverage share the production module; the nightly
  E2E suite builds a development one (no wasm-opt, no brotli).
  They differ only in variant and artifact paths, so the keying rules -
  the part that is dangerous to get wrong - live here once.

inputs:
  variant:
    description: prod or dev. Part of the key, so the two builds can never collide.
    required: true
  path:
    description: >-
      Newline-separated artifact paths to cache. Defaults to the variant's
      canonical file set, which is what every caller wants; override only to
      cache something else under the same keying rules.
    default: ""
  cache-epoch:
    description: Bump to invalidate every cached module by hand.
    default: "1"
  save:
    description: >-
      "false" restores without registering the post-job save. Callers that
      never build the module (the preview fast path) must set this: on a miss
      they hold nothing worth caching, and writing the key first would deny it
      to the job that does build - permanently, since the key is source-exact
      and never rewritten.
    default: "true"

outputs:
  cache-hit:
    description: "'true' when the module was restored and the build can be skipped."
    value: ${{ steps.cache.outputs.cache-hit || steps.restore.outputs.cache-hit }}
  key:
    description: The resolved cache key.
    value: ${{ steps.key.outputs.key }}
  path:
    description: >-
      The newline-separated paths that were cached. Callers that upload the same
      files as a workflow artifact read this instead of restating the list.
    value: ${{ steps.paths.outputs.path }}

runs:
  using: composite
  steps:
    # The file set is a property of the variant, not of the caller: a dev build
    # emits no wasm-opt/brotli sidecars and no prod checksum. Resolving it here
    # keeps a caller from caching a subset of what it later uploads.
    - name: Resolve artifact paths
      id: paths
      shell: bash
      env:
        VARIANT: ${{ inputs.variant }}
        OVERRIDE: ${{ inputs.path }}
      run: |
        wasm_dir=packages/rom-weaver-webapp/src/wasm
        if [ -n "$OVERRIDE" ]; then
          paths="$OVERRIDE"
        else
          # A dev build runs neither wasm-opt nor brotli and writes no prod
          # checksum, so it has three of the five files.
          case "$VARIANT" in
            prod) names=(rom-weaver-app.wasm rom-weaver-app.wasm.br rom-weaver-app.wasm.prod.sha256 NOTICE third_party) ;;
            dev) names=(rom-weaver-app.wasm NOTICE third_party) ;;
            *) echo "::error::unknown wasm variant '$VARIANT'"; exit 1 ;;
          esac
          paths=$(printf '%s\n' "${names[@]/#/$wasm_dir/}")
        fi
        {
          echo "path<<PATHS_EOF"
          printf '%s\n' "$paths"
          echo "PATHS_EOF"
        } >> "$GITHUB_OUTPUT"
        printf 'caching (%s):\n%s\n' "$VARIANT" "$paths"

    # Hash every source, dependency, toolchain, and build-script input to the
    # emitted module. git ls-tree resolves the PR merge tree, unlike hashFiles.
    # Test targets never enter this production build, so exclude them instead
    # of making a test-only edit rebuild the ~6.5-minute module. Inline
    # #[cfg(test)] blocks remain part of their source file's hash.
    - name: Compute wasm cache key
      id: key
      shell: bash
      env:
        VARIANT: ${{ inputs.variant }}
        CACHE_EPOCH: ${{ inputs.cache-epoch }}
      run: |
        basis=$(
          {
            git ls-tree -r HEAD -- \
              Cargo.lock Cargo.toml .cargo scripts/wasm \
              scripts/gen-third-party-licenses.mjs \
              .github/actions/setup-build-env
            printf 'mise-wasm-config\n'
            git show HEAD:.mise.toml | awk '
              /^\[tools\]/ { section = "tools"; next }
              /^\[env\]/ { section = "env"; next }
              /^\[tasks\./ { section = $0 }
              section == "tools" && /^(node|rust|"aqua:WebAssembly\/binaryen") =/ { print }
              section == "env" && /^(WASI_|CC_|CXX_|AR_|RANLIB_|CFLAGS_|CXXFLAGS_|CARGO_INCREMENTAL)/ { print }
              (section == "[tasks.build-wasm]" || section == "[tasks.build-wasm-prod]") && /^(env\.|run =)/ { print }
            '
            git ls-tree -r HEAD -- crates | while read -r mode type object path; do
              case "$path" in
                */tests/*|*/test/*|*/examples/*|*/benches/*|*/src/test*.rs|*/src/*/test*.rs)
                  continue
                  ;;
              esac
              printf '%s %s %s\t%s\n' "$mode" "$type" "$object" "$path"
            done
          }
        )
        if [ -z "$basis" ]; then
          echo "::error::wasm cache basis resolved to nothing - refusing to key a cache on an empty tree"
          exit 1
        fi
        hash=$(printf '%s\n' "$basis" | sha256sum | cut -d' ' -f1)
        echo "key=wasm-${VARIANT}-${RUNNER_OS}-e${CACHE_EPOCH}-${hash}" >> "$GITHUB_OUTPUT"
        printf 'cache basis:\n%s\n' "$basis"

    # No restore-keys: partial-prefix hits could serve different source. GitHub
    # exposes default-branch caches to PRs; PR-written caches remain branch-local.
    - name: Restore built wasm module
      id: cache
      if: inputs.save != 'false'
      uses: actions/cache@v6
      with:
        key: ${{ steps.key.outputs.key }}
        path: ${{ steps.paths.outputs.path }}

    - name: Restore built wasm module (read-only)
      id: restore
      if: inputs.save == 'false'
      uses: actions/cache/restore@v6
      with:
        key: ${{ steps.key.outputs.key }}
        path: ${{ inputs.path }}

    # Without this the only evidence the cache works is an unexplained swing
    # in job duration, which is a poor thing to debug from months later.
    - name: Report cache status
      shell: bash
      env:
        HIT: ${{ steps.cache.outputs.cache-hit || steps.restore.outputs.cache-hit }}
        KEY: ${{ steps.key.outputs.key }}
        VARIANT: ${{ inputs.variant }}
        SAVE: ${{ inputs.save }}
      run: |
        if [ "$HIT" = "true" ]; then
          echo "**WASM cache hit** (${VARIANT}) - restored, skipping the ~6.5 min build." >> "$GITHUB_STEP_SUMMARY"
        elif [ "$SAVE" = "false" ]; then
          echo "**WASM cache miss** (${VARIANT}) - read-only caller, nothing to build here." >> "$GITHUB_STEP_SUMMARY"
        else
          echo "**WASM cache miss** (${VARIANT}) - building from source." >> "$GITHUB_STEP_SUMMARY"
        fi
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "key: \`${KEY}\`" >> "$GITHUB_STEP_SUMMARY"
