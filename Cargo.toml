[workspace]
members = [
    "crates/rom-weaver-chd-sys",
    "crates/rom-weaver-checksum",
    "crates/rom-weaver-cli",
    "crates/rom-weaver-codecs",
    "crates/rom-weaver-containers",
    "crates/rom-weaver-core",
    "crates/rom-weaver-patches",
]
resolver = "2"

[workspace.package]
edition = "2024"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
version = "0.1.0"

[workspace.dependencies]
adler2 = "2.0.1"
assert_cmd = "2.1.1"
assert_fs = "1.1.3"
blake3 = "1.8.2"
bzip2 = "0.6.1"
ciso = { version = "0.2.1", default-features = false, features = ["sync"] }
chd = "0.3.4"
cc = "1.2.43"
clap = { version = "4.5.51", features = ["derive"] }
crc16 = "0.4.0"
crc32c = "0.6.8"
crc32fast = "1.5.0"
flate2 = "1.1.5"
lz4_flex = "0.11.6"
lzma-rust2 = "0.16.2"
libflac-sys = "0.3.4"
libz-sys = { version = "1.1.28", default-features = false }
md-5 = "0.11.0"
memmap2 = "0.9.5"
nod = { version = "2.0.0-alpha.6", default-features = false, features = ["compress-bzip2-vendored", "compress-lzma-vendored", "compress-zlib-vendored", "compress-zstd-vendored", "threading"] }
pkg-config = "0.3.32"
predicates = "3.1.3"
qbsdiff = "1.4.4"
rayon = "1.11.0"
sevenz-rust = { package = "sevenz-rust2", version = "0.20.2", default-features = false, features = ["compress", "bzip2", "zstd"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
sha1 = "0.11.0"
sha2 = "0.10.9"
tar = "0.4.44"
thiserror = "2.0.17"
tracing = "0.1.41"
tracing-subscriber = { version = "0.3.20", features = ["env-filter", "json"] }
unrar-ng = "0.7.7"
xdvdfs = { version = "0.8.3", default-features = false, features = ["std", "read", "write", "sync"] }
zip = { version = "6.0.0", default-features = false, features = ["deflate-flate2-zlib-rs", "bzip2", "zstd"] }
zstd-sys = { version = "2.0.16", default-features = false }
zstd-seekable = "0.1.23"
zstd = "0.13.3"

[profile.wasm-release]
inherits = "release"
codegen-units = 1
debug = 0
incremental = false
lto = "fat"
opt-level = 3
panic = "abort"
strip = "symbols"

[patch.crates-io]
libflac-sys = { path = "vendor/libflac-sys-0.3.4" }
sevenz-rust2 = { path = "vendor/sevenz-rust2-0.20.2" }
zstd-seekable = { path = "vendor/zstd-seekable-0.1.23" }
