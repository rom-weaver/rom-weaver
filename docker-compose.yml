# Serve the RomWeaver webapp (static SPA) behind your HTTPS reverse proxy.
#
# Start:       docker compose up --build --detach
# Open:        http://localhost:8080
# Custom port: PORT=3000 docker compose up --build --detach
#
# The container speaks plain HTTP on 8080; your reverse proxy terminates TLS
# and forwards to webapp:8080. COOP/COEP/CORP headers and brotli (*.br) pass
# straight through. For a standalone HTTPS listener instead of a proxy, mount a
# cert + key and set SERVER_HTTP2_TLS=true / SERVER_HTTP2_TLS_CERT / _KEY.
services:
  webapp:
    build:
      context: .
      dockerfile: packages/rom-weaver-webapp/Dockerfile
    image: rom-weaver-webapp
    ports:
      - "${PORT:-8080}:8080"
    restart: unless-stopped
