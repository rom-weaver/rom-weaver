# WASI / WebAssembly toolchain, build environment, and tasks.
#
# Replaces the former scripts/build-wasm-*.sh and scripts/wasm/with-wasi-env.sh.
# The static threaded rustflags live in .cargo/config.toml; the SDK-relative
# toolchain wiring lives in [env] below; orchestration lives in [tasks.*].
#
# Run `mise tasks` to list, `mise run build-wasm` for dev, `mise run build-wasm-prod` for CI/release.

[tools]
# Pinned toolchain. mise installs these on activation (and in CI via mise-action),
# so dev and CI share exact versions.
#
# Deliberately NOT pinned here:
#   - WASI SDK: pinning it puts its bin/ (clang) on PATH, which makes bindgen's
#     clang-sys load the wasi-sdk libclang and breaks the libarchive-sys binding
#     generation on macOS (multiarch sysroot includes don't resolve via libclang).
#     It stays sourced via scripts/wasm/detect-wasi-sdk.sh (local) / the CI
#     download step, neither of which shadows the host clang on PATH.
#   - sccache: install via OS package (brew install sccache / apt install sccache).
#   - twiggy: no binary releases (`cargo install` when needed for size analysis).
node = "24.18.0"
rust = "1.95.0"
"aqua:WebAssembly/binaryen" = "129"            # provides wasm-opt
"aqua:BurntSushi/ripgrep" = "14.1.1"           # provides rg (thread-guard checks)
"aqua:EmbarkStudios/cargo-deny" = "0.20.2"
"ubi:bnjbvr/cargo-machete" = "0.9.1"
"ubi:obi1kenobi/cargo-semver-checks" = "0.46.0"
"aqua:rhysd/actionlint" = "1.7.12"              # workflow linting (shellcheck-aware)

[env]
# WASI SDK discovery. detect-wasi-sdk.sh prints the SDK root, preferring an
# explicit $WASI_SDK_PATH, then legacy install locations. When no SDK is present
# these resolve to broken paths and the build tasks fail with a clear toolchain
# error - harmless for non-wasm commands.
WASI_SDK_PATH = "{{ exec(command='bash ' ~ config_root ~ '/scripts/wasm/detect-wasi-sdk.sh') }}"
WASI_SYSROOT = "{{ env.WASI_SDK_PATH }}/share/wasi-sysroot"
WASI_CLANG = "{{ env.WASI_SDK_PATH }}/bin/clang"
WASI_CLANGXX = "{{ env.WASI_SDK_PATH }}/bin/clang++"
WASI_AR = "{{ env.WASI_SDK_PATH }}/bin/llvm-ar"
WASI_RANLIB = "{{ env.WASI_SDK_PATH }}/bin/llvm-ranlib"
WASI_STRIP = "{{ env.WASI_SDK_PATH }}/bin/llvm-strip"

# cc-rs toolchain wiring for C/C++ dependencies (liblzma, libarchive, ...).
# Single-threaded target.
CC_wasm32_wasip1 = "{{ env.WASI_CLANG }} --sysroot={{ env.WASI_SYSROOT }}"
CXX_wasm32_wasip1 = "{{ env.WASI_CLANGXX }} --sysroot={{ env.WASI_SYSROOT }}"
AR_wasm32_wasip1 = "{{ env.WASI_AR }}"
RANLIB_wasm32_wasip1 = "{{ env.WASI_RANLIB }}"
CFLAGS_wasm32_wasip1 = "-msimd128"
CXXFLAGS_wasm32_wasip1 = "-msimd128"

# Threaded target. CC/CXX point at the wrapper scripts that normalize the target
# triple and force-include the liblzma threading shim; they read WASI_CLANG/
# WASI_CLANGXX/WASI_SYSROOT from the env above.
CC_wasm32_wasip1_threads = "{{ config_root }}/scripts/wasm/wasm32-wasip1-threads-cc.sh"
CXX_wasm32_wasip1_threads = "{{ config_root }}/scripts/wasm/wasm32-wasip1-threads-cxx.sh"
AR_wasm32_wasip1_threads = "{{ env.WASI_AR }}"
RANLIB_wasm32_wasip1_threads = "{{ env.WASI_RANLIB }}"
CFLAGS_wasm32_wasip1_threads = "-matomics -mbulk-memory -msimd128"
CXXFLAGS_wasm32_wasip1_threads = "-matomics -mbulk-memory -msimd128"

# sccache: cache rustc invocations across builds and worktrees (install separately, see [tools] note).
# CARGO_INCREMENTAL=0 because sccache caches at the rustc level; cargo's own incremental artifacts
# are incompatible with it and would silently bypass the cache.
# SCCACHE_CACHE_SIZE: default is 10 GiB which fills quickly across worktrees; 35 GiB keeps hit
# rates high (the file-based config is not picked up by sccache 0.15.0 on macOS).
#
# Resolved rather than hardcoded: a bare "sccache" made every cargo call under
# mise fail with "could not execute process `sccache`" wherever the binary was
# absent, which is exactly what broke CI. Empty is ignored by cargo, so hosts
# without sccache silently build unwrapped instead of failing. CI is one of
# them - its rustc cache was never persisted, so sccache only ever added
# overhead there while Swatinem/rust-cache does the real caching.
RUSTC_WRAPPER = "{{ exec(command='command -v sccache || true') | trim }}"
CARGO_INCREMENTAL = "0"
SCCACHE_CACHE_SIZE = "35G"

# --- Tasks ----------------------------------------------------------------

[tasks.wasm-check]
description = "Type-check the threaded WASM target (containers lib)"
run = "cargo check -p rom-weaver-containers --target wasm32-wasip1-threads --lib"

[tasks.build-wasm]
description = "Build the threaded WASM app module (fast local dev build, no wasm-opt/brotli)"
# Release C builds add -O3 -flto on top of the lean check-time CFLAGS above.
# These mirror build-wasm-prod's flags; scripts/wasm/build-app.sh holds the
# shared build body so only this CFLAGS block differs between the two tasks.
env.CFLAGS_wasm32_wasip1 = "-msimd128 -O3 -flto"
env.CXXFLAGS_wasm32_wasip1 = "-msimd128 -O3 -flto"
env.CFLAGS_wasm32_wasip1_threads = "-matomics -mbulk-memory -msimd128 -O3 -flto"
env.CXXFLAGS_wasm32_wasip1_threads = "-matomics -mbulk-memory -msimd128 -O3 -flto"
run = "bash {{ config_root }}/scripts/wasm/build-app.sh dev"

[tasks.build-wasm-prod]
description = "Build the threaded WASM app module with wasm-opt and brotli (CI/release)"
# Release C builds add -O3 -flto on top of the lean check-time CFLAGS above.
# Same flags as build-wasm; the prod-only wasm-opt + brotli tail lives in
# scripts/wasm/build-app.sh, selected by the `prod` argument.
env.CFLAGS_wasm32_wasip1 = "-msimd128 -O3 -flto"
env.CXXFLAGS_wasm32_wasip1 = "-msimd128 -O3 -flto"
env.CFLAGS_wasm32_wasip1_threads = "-matomics -mbulk-memory -msimd128 -O3 -flto"
env.CXXFLAGS_wasm32_wasip1_threads = "-matomics -mbulk-memory -msimd128 -O3 -flto"
run = "bash {{ config_root }}/scripts/wasm/build-app.sh prod"

[tasks.build-wasm-twiggy]
description = "Build an unoptimized, symbol-rich WASM module for twiggy analysis"
env.CARGO_PROFILE_WASM_RELEASE_STRIP = "none"
env.CARGO_PROFILE_WASM_RELEASE_DEBUG = "true"
run = '''
#!/usr/bin/env bash
set -euo pipefail

target="wasm32-wasip1-threads"
out_dir="${ROM_WEAVER_WASM_TWIGGY_OUT_DIR:-$MISE_PROJECT_ROOT/target/wasm-twiggy}"
mkdir -p "$out_dir"

cargo build -p rom-weaver-app --bin rom-weaver-app --profile wasm-release --target "$target"
cp "$MISE_PROJECT_ROOT/target/$target/wasm-release/rom-weaver-app.wasm" "$out_dir/rom-weaver-app.wasm"

echo "twiggy-ready artifact: $out_dir/rom-weaver-app.wasm"
echo "run: twiggy top -n 80 $out_dir/rom-weaver-app.wasm"
'''

# --- Quality gate ---------------------------------------------------------
# Single source of truth for the checks shared by lefthook (pre-commit) and CI.
# lefthook keeps its `glob` gating and just delegates the `run` to these tasks.

[tasks.fmt]
description = "Check Rust formatting"
run = "cargo fmt --package rom-weaver-app --package rom-weaver-chd --package rom-weaver-checksum --package rom-weaver-cli --package rom-weaver-codecs --package rom-weaver-containers --package rom-weaver-core --package rom-weaver-libarchive --package rom-weaver-libarchive-sys --package rom-weaver-patches --package rom-weaver-xdelta --check"

[tasks.clippy]
description = "Lint the workspace with clippy (warnings are errors)"
run = "cargo clippy --workspace --exclude rom-weaver-nod --all-targets --no-deps -- -D warnings"

[tasks.typegen]
description = "Regenerate TypeScript bindings from Rust"
run = "cargo run -p rom-weaver-app --features typescript-types --bin rom-weaver-typegen -- --write"

[tasks.typegen-check]
description = "Verify TypeScript bindings are up to date"
run = "cargo run -p rom-weaver-app --features typescript-types --bin rom-weaver-typegen -- --check"

[tasks.manpages]
description = "Regenerate CLI man pages from Clap definitions"
run = "cargo run -p rom-weaver-cli --example generate_manpages -- --write"

[tasks.licenses]
description = "Generate a build-time third-party attribution bundle"
run = '''
#!/usr/bin/env bash
set -euo pipefail
output_dir="${ROM_WEAVER_LICENSE_OUTPUT_DIR:-$MISE_PROJECT_ROOT/target/license-bundle}"
rm -rf "$output_dir"
node "{{ config_root }}/scripts/gen-third-party-licenses.mjs" "$output_dir"
'''

[tasks.licenses-check]
description = "Verify the build-time third-party attribution bundle"
run = '''
#!/usr/bin/env bash
set -euo pipefail
output_dir="$(mktemp -d)"
trap 'rm -rf "$output_dir"' EXIT
node "{{ config_root }}/scripts/gen-third-party-licenses.mjs" "$output_dir"
test -s "$output_dir/NOTICE"
test -s "$output_dir/THIRD_PARTY_LICENSES.md"
test -d "$output_dir/third_party/licenses"
'''

[tasks.deny]
description = "Check Rust dependencies for advisories, licenses, and unknown sources"
# Policy lives in deny.toml. This gates what enters the tree; `licenses-check`
# above generates the attribution bundle for what already did.
run = "cargo deny check"

[tasks.machete]
description = "Find unused Rust dependencies"
# Heuristic source scan, so confirmed false positives are recorded per-crate
# under [package.metadata.cargo-machete] with a reason rather than suppressed
# globally. --skip-target-dir keeps it off build artifacts.
#
# Paths are explicit because cargo-machete walks directories rather than
# workspace members, so a bare run also scans the vendor/nod and
# vendor/libarchive submodules - upstream manifests we don't control and don't
# build. The vendored crates listed here ARE workspace members, so they stay
# covered; bump these paths when one of them is revendored at a new version.
run = """cargo-machete --skip-target-dir \
  crates \
 """

[tasks.semver-checks]
description = "Check published crates for accidental breaking API changes"
# No-op until the first crates.io publish - cargo-semver-checks diffs against
# the released baseline, so unpublished crates have nothing to compare to. The
# release workflow runs this per-crate and skips ones with no baseline; run it
# by hand here when you want the whole workspace at once.
run = "cargo semver-checks check-release --workspace"

[tasks.test-rust]
description = "Run the Rust workspace test suite"
# --quiet collapses the ~1400 per-test `... ok` lines into progress dots; a
# failing test still prints its full name and panic output.
run = "cargo test --quiet --workspace --exclude rom-weaver-nod"

[tasks.coverage-rust]
description = "Run the Rust workspace tests under llvm-cov and emit HTML + lcov coverage"
# Requires cargo-llvm-cov + the llvm-tools-preview component. llvm-cov recompiles
# the workspace with instrumentation into its own target subdir, so this does not
# reuse the normal `cargo test` artifacts - run it on demand, not in the gate.
# Collect once with --no-report, then emit both formats from the same profdata.
run = '''
#!/usr/bin/env bash
set -euo pipefail
out_dir="{{ config_root }}/dist/coverage/rust"
rm -rf "$out_dir"
mkdir -p "$out_dir"
cargo llvm-cov clean --workspace
cargo llvm-cov --workspace --exclude rom-weaver-nod --no-report
cargo llvm-cov report --html --output-dir "$out_dir"
cargo llvm-cov report --lcov --output-path "$out_dir/lcov.info"
'''

[tasks.actionlint]
description = "Lint GitHub Actions workflows and composite actions"
# Catches undefined action inputs, bad expressions, and (via shellcheck, when
# present) issues in `run:` scripts. Workflow bugs otherwise only surface as a
# failed run minutes after a push, so this belongs in the pre-commit hook.
run = "actionlint"

[tasks.thread-guards]
description = "Fail on threaded-WASM suppression regressions"
run = "{{ config_root }}/scripts/check-thread-guards.sh"

[tasks.dev]
description = "Run the webapp dev server"
run = "npm --prefix packages/rom-weaver-webapp run dev --"

[tasks.preview]
description = "Preview the built webapp"
run = "npm --prefix packages/rom-weaver-webapp run preview --"

[tasks.test-e2e-fast]
description = "Run CLI, WASM, browser, and real webapp E2E checks in parallel"
run = "npm --prefix packages/rom-weaver-webapp run test:e2e:fast"

[tasks.test-e2e-nightly]
description = "Run exhaustive CLI/WASM interaction matrices plus WebKit and webapp E2E"
run = "npm --prefix packages/rom-weaver-webapp run test:e2e:nightly"

[tasks.test-e2e-ios]
description = "Generate the archive corpus and serve the iOS matrix over HTTPS on the LAN"
run = "npm --prefix packages/rom-weaver-webapp run test:e2e:ios --"

[tasks.ci]
description = "Run the full local quality gate (mirrors CI)"
depends = ["fmt", "clippy", "typegen-check", "wasm-check", "thread-guards", "licenses-check", "deny", "machete", "test-rust", "build-wasm-prod"]
run = '''
#!/usr/bin/env bash
set -euo pipefail
npm --prefix packages/rom-weaver-webapp run lint
npm test
npm --prefix packages/rom-weaver-webapp run test:unit
npm --prefix packages/rom-weaver-webapp run test:browser:wasm
npm --prefix packages/rom-weaver-webapp run test:browser:parallel
npm --prefix packages/rom-weaver-webapp run test:e2e:webapp
npm --prefix packages/rom-weaver-webapp run build
'''
