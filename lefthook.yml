pre-commit:
  # Run independent checks concurrently. The cargo commands share one target
  # dir and serialize on its build lock, but the npm checks overlap with them.
  parallel: true
  commands:
    # `glob` only gates whether a command runs (no `{staged_files}` template, so
    # each command still runs workspace-wide). Rust/wasm checks are skipped on
    # React-only commits and vice versa; CI runs the full suite unconditionally.
    rust-format:
      glob: "*.rs"
      run: mise run fmt
    rust-clippy:
      glob: "*.{rs,toml,lock}"
      run: mise run clippy
    rust-typegen:
      glob: "*.rs"
      run: mise run typegen-check
    wasm-threaded-check:
      glob: "*.{rs,toml,lock}"
      run: 'RUSTFLAGS="${RUSTFLAGS:-} -D warnings" mise run wasm-check'
    licenses-check:
      glob: "*.{toml,lock}"
      run: mise run licenses-check
    # Both are manifest/lockfile-scoped: cargo-deny reads Cargo.lock, machete
    # reads the Cargo.tomls. Neither compiles anything, so they cost little
    # next to the clippy run already gated on the same glob.
    # Policy half only, matching CI: a fresh advisory against a dependency you
    # did not touch should not block the commit in front of you.
    cargo-deny:
      glob: "*.{toml,lock}"
      run: mise run deny-policy
    cargo-machete:
      glob: "*.toml"
      run: mise run machete
    # Scoped to the three inputs the committed channel icons are rendered from,
    # so the browser only launches on commits that could actually stale them.
    channel-icons:
      glob:
        - "packages/rom-weaver-webapp/src/assets/app/root/logo.svg"
        - "packages/rom-weaver-webapp/design/icon-masters/*"
        - "packages/rom-weaver-webapp/src/webapp/accent.ts"
      run: npm --prefix packages/rom-weaver-webapp run icons:channels:check
    react-lint:
      glob: "packages/rom-weaver-webapp/**"
      run: npm --prefix packages/rom-weaver-webapp run lint:code
    react-format:
      glob: "packages/rom-weaver-webapp/**"
      run: npm --prefix packages/rom-weaver-webapp run format:check
    react-types:
      glob: "packages/rom-weaver-webapp/**"
      run: npm --prefix packages/rom-weaver-webapp run lint:types
    # knip, browser-compat, the i18n catalog compile and the legacy-string audit
    # are all part of CI's `npm run lint`; running them here too keeps a dead
    # export, a browser-compat regression, a stale/incomplete message catalog, or
    # a reintroduced legacy identifier from passing the local hook and only
    # failing in CI. All are static analyses (no build), on par with the tsc run
    # above.
    react-knip:
      glob: "packages/rom-weaver-webapp/**"
      run: npm --prefix packages/rom-weaver-webapp run lint:knip
    # jscpd (copy/paste detection) is a CI `npm run lint` step too; gating it
    # here keeps a duplication regression over the .jscpd.json threshold from
    # passing the local hook and only failing in CI. Static analysis, no build.
    react-jscpd:
      glob: "packages/rom-weaver-webapp/**"
      run: npm --prefix packages/rom-weaver-webapp run lint:jscpd
    react-browser-compat:
      glob: "packages/rom-weaver-webapp/**"
      run: npm --prefix packages/rom-weaver-webapp run lint:browser-compat
    react-i18n:
      glob: "packages/rom-weaver-webapp/**"
      run: npm --prefix packages/rom-weaver-webapp run lint:i18n
    react-audit-strings:
      glob: "packages/rom-weaver-webapp/**"
      run: npm --prefix packages/rom-weaver-webapp run audit:strings
    # The `@rom-weaver/*` platform packages are unpublished, so npm cannot
    # resolve them and silently drops their lock entries on any `npm install`
    # - which then breaks `npm ci` for every CI job. Fail here instead.
    root-lock-sync:
      glob: "package{,-lock}.json"
      run: npm ci --ignore-scripts --dry-run
    # Workflow mistakes are invisible until a push burns a runner minute, so
    # they are worth catching at commit time. Covers the composite actions too.
    actionlint:
      glob: ".github/**/*.{yml,yaml}"
      run: mise run actionlint
    # Same reasoning as actionlint: a broken script or image build otherwise
    # only shows up when a workflow, a self-hoster's `docker build`, or a
    # worktree setup run trips over it. Both tasks lint every tracked file, so
    # the glob only decides whether the check is worth running at all.
    shellcheck:
      glob: "*.sh"
      run: mise run shellcheck
    hadolint:
      glob: "{Dockerfile,Dockerfile.*,**/Dockerfile,**/Dockerfile.*,.hadolint.yaml}"
      run: mise run hadolint
    markdown-toc:
      files: git diff --name-only --cached --diff-filter=ACMR -- README.md docs .github/CODE_OF_CONDUCT.md .github/CONTRIBUTING.md .github/RELEASING.md .github/SECURITY.md packages/rom-weaver-webapp/design/icon-masters/README.md packages/rom-weaver-webapp/src/wasm/README.md scripts/wasm/README.md
      run: bash scripts/update-markdown-toc.sh {files}
      stage_fixed: true
    whitespace:
      # Same task CI runs, so an exclusion can never apply to one and not the
      # other. Vendored trees are skipped: they are verbatim upstream snapshots,
      # and restyling them would turn every refresh into a merge.
      run: mise run whitespace
    thread-guard-regressions:
      glob: "*.rs"
      run: mise run thread-guards

commit-msg:
  commands:
    strip-ai-attribution:
      run: ./scripts/strip-ai-attribution.sh {1}
