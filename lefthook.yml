pre-commit:
  # Run independent checks concurrently. The cargo commands share one target
  # dir and serialize on its build lock, but the npm checks overlap with them.
  parallel: true
  commands:
    # `glob` only gates whether a command runs (no `{staged_files}` template, so
    # each command still runs workspace-wide). Rust/wasm checks are skipped on
    # React-only commits and vice versa; CI runs the full suite unconditionally.
    rust-format:
      glob: "*.rs"
      run: mise run fmt
    rust-clippy:
      glob: "*.{rs,toml,lock}"
      run: mise run clippy
    rust-typegen:
      glob: "*.rs"
      run: mise run typegen-check
    wasm-threaded-check:
      glob: "*.{rs,toml,lock}"
      run: 'RUSTFLAGS="${RUSTFLAGS:-} -D warnings" mise run wasm-check'
    licenses-check:
      glob: "*.{toml,lock}"
      run: mise run licenses-check
    react-lint:
      glob: "packages/rom-weaver-react/**"
      run: npm --prefix packages/rom-weaver-react run lint:code
    react-types:
      glob: "packages/rom-weaver-react/**"
      run: npm --prefix packages/rom-weaver-react run lint:types
    # knip + browser-compat are part of CI's `npm run lint`; running them here
    # too keeps a dead-export or browser-compat regression from passing the local
    # hook and only failing in CI. Both are static analyses (no build), on par
    # with the tsc run above.
    react-knip:
      glob: "packages/rom-weaver-react/**"
      run: npm --prefix packages/rom-weaver-react run lint:knip
    react-browser-compat:
      glob: "packages/rom-weaver-react/**"
      run: npm --prefix packages/rom-weaver-react run lint:browser-compat
    whitespace:
      run: git diff --cached --check
    thread-guard-regressions:
      glob: "*.rs"
      run: mise run thread-guards
